<title>Go2 Website Variations Viewer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --sidebar-w:280px;
    --top-bar-h:56px;
    --bg:#0f1117;
    --sidebar-bg:#161822;
    --card-bg:#1e2030;
    --card-hover:#272a3d;
    --card-active:#2d3152;
    --accent:#6c8aff;
    --accent-dim:#4a5fa0;
    --text:#e2e4ed;
    --text-dim:#8b8fa6;
    --text-muted:#5a5e74;
    --border:#2a2d40;
    --star:#f5c542;
    --tag-bg:#262940;
    --tag-active:#6c8aff;
    --tag-active-text:#fff;
    --danger:#ff5c5c;
    --success:#4ade80;
  }
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}

  /* TOP BAR */
  .top-bar{
    height:var(--top-bar-h);display:flex;align-items:center;padding:0 20px;
    background:var(--sidebar-bg);border-bottom:1px solid var(--border);
    gap:16px;position:fixed;top:0;left:var(--sidebar-w);right:0;z-index:10;
  }
  .top-bar .counter{
    font-size:13px;color:var(--text-dim);white-space:nowrap;min-width:70px;
  }
  .top-bar .var-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-bar .var-desc{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .top-bar .nav-btn{
    background:var(--card-bg);border:1px solid var(--border);color:var(--text);
    width:34px;height:34px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:16px;transition:background .15s;flex-shrink:0;
  }
  .top-bar .nav-btn:hover{background:var(--card-hover)}
  .top-bar .open-btn{
    background:var(--accent);border:none;color:#fff;padding:0 14px;height:34px;
    border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;
    transition:opacity .15s;flex-shrink:0;
  }
  .top-bar .open-btn:hover{opacity:.85}
  .top-bar .jump-input{
    width:52px;height:34px;border-radius:6px;border:1px solid var(--border);
    background:var(--card-bg);color:var(--text);text-align:center;font-size:14px;
    font-weight:600;outline:none;flex-shrink:0;
  }
  .top-bar .jump-input:focus{border-color:var(--accent)}
  .top-bar .jump-input::placeholder{color:var(--text-muted);font-weight:400}
  .top-bar .star-btn{
    background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;
    transition:transform .15s;padding:4px;
  }
  .top-bar .star-btn:hover{transform:scale(1.2)}
  .top-bar .star-btn.starred{color:var(--star)}
  .top-bar .star-btn:not(.starred){color:var(--text-muted)}

  /* SIDEBAR */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
    background:var(--sidebar-bg);border-right:1px solid var(--border);
    display:flex;flex-direction:column;z-index:20;overflow:hidden;
  }
  .sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-header h1{font-size:16px;font-weight:700;margin-bottom:2px}
  .sidebar-header .subtitle{font-size:11px;color:var(--text-dim)}

  /* FILTERS */
  .filters{
    padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
    display:flex;flex-wrap:wrap;gap:5px;
  }
  .filter-tag{
    padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;
    background:var(--tag-bg);color:var(--text-dim);cursor:pointer;
    border:1px solid transparent;transition:all .15s;white-space:nowrap;
  }
  .filter-tag:hover{color:var(--text);border-color:var(--border)}
  .filter-tag.active{background:var(--tag-active);color:var(--tag-active-text);border-color:var(--tag-active)}

  /* VARIATION LIST */
  .var-list{flex:1;overflow-y:auto;padding:8px}
  .var-list::-webkit-scrollbar{width:5px}
  .var-list::-webkit-scrollbar-track{background:transparent}
  .var-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .var-card{
    padding:10px 12px;border-radius:8px;cursor:pointer;
    margin-bottom:4px;transition:background .12s;border:1px solid transparent;
    position:relative;
  }
  .var-card:hover{background:var(--card-hover)}
  .var-card.active{background:var(--card-active);border-color:var(--accent-dim)}
  .var-card.hidden{display:none}
  .var-card .card-num{font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
  .var-card .card-num .card-star{color:var(--star);font-size:12px}
  .var-card .card-title{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3}
  .var-card .card-desc{font-size:11px;color:var(--text-dim);line-height:1.3}
  .var-card .card-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
  .var-card .card-tag{font-size:9px;padding:1px 6px;border-radius:6px;background:var(--tag-bg);color:var(--text-muted)}
  .var-card .card-tag.mp{background:#2d1f3d;color:#c084fc}

  /* IFRAME */
  .main{
    position:fixed;top:var(--top-bar-h);left:var(--sidebar-w);right:0;bottom:0;
    background:#fff;
  }
  .main iframe{
    width:100%;height:100%;border:none;
    transition:opacity .2s ease;
  }
  .main iframe.loading{opacity:.3}

  /* MOBILE SIDEBAR TOGGLE */
  .sidebar-toggle{
    display:none;position:fixed;top:10px;left:10px;z-index:30;
    background:var(--card-bg);border:1px solid var(--border);color:var(--text);
    width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:18px;
  }
  @media(max-width:768px){
    :root{--sidebar-w:0px}
    .sidebar{transform:translateX(-280px);transition:transform .25s ease}
    .sidebar.open{transform:translateX(0);width:280px}
    .sidebar-toggle{display:flex;align-items:center;justify-content:center}
    .top-bar{left:0}
    .main{left:0}
  }

  /* KEYBOARD HINT */
  .kbd-hint{
    position:fixed;bottom:16px;right:16px;font-size:11px;color:var(--text-muted);
    background:var(--sidebar-bg);padding:6px 12px;border-radius:8px;border:1px solid var(--border);
    z-index:5;
  }
  .kbd-hint kbd{
    background:var(--card-bg);padding:1px 6px;border-radius:4px;border:1px solid var(--border);
    font-family:inherit;margin:0 2px;
  }
</style>
</head>

const FILTERS = [
  {key:"all",label:"All"},
  {key:"super",label:"\u2b50 Best"},
  {key:"breakthrough",label:"\ud83d\ude80 Breakthrough"},
  {key:"tool",label:"\ud83d\udee0 Interactive Tools"},
  {key:"agent",label:"\ud83e\udd16 AI Experiences"},
  {key:"industry",label:"\ud83c\udfed Industry"},
  {key:"conversion",label:"\ud83c\udfaf Conversion"},
  {key:"dataviz",label:"\ud83d\udcca Data Viz"},
  {key:"design",label:"\ud83c\udfa8 Design"},
  {key:"deepdive",label:"\ud83d\udd2c Deep Dives"},
  {key:"unconventional",label:"\ud83e\udd2f Unconventional"},
  {key:"single",label:"Single Page"},
  {key:"multi",label:"Multi-Page"},
  {key:"starred",label:"\u2605 Starred"},
];

const TAG_LABELS = {single:"Single",multi:"Multi-Page",premium:"Premium",agent:"AI Experience","no-tracking":"No Tracking",unconventional:"Unconventional",tool:"Interactive Tool",industry:"Industry",conversion:"Conversion",dataviz:"Data Viz",design:"Design",deepdive:"Deep Dive",breakthrough:"Breakthrough",super:"Best"};

let currentIndex = 0;
let activeFilter = "all";
let stars = JSON.parse(localStorage.getItem("go2-stars") || "[]");

// Touch/swipe
let touchStartX = 0;
let touchStartY = 0;

function getVisibleIndices() {
  return VARIATIONS.reduce((acc, v, i) => {
    if (activeFilter === "all" || (activeFilter === "starred" && stars.includes(v.id)) || v.tags.includes(activeFilter)) acc.push(i);
    return acc;
  }, []);
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = FILTERS.map(f =>
    `<div class="filter-tag${activeFilter===f.key?' active':''}" data-filter="${f.key}">${f.label}</div>`
  ).join("");
  el.querySelectorAll(".filter-tag").forEach(t => {
    t.addEventListener("click", () => {
      activeFilter = t.dataset.filter;
      renderFilters();
      renderList();
      const vis = getVisibleIndices();
      if (vis.length && !vis.includes(currentIndex)) loadVariation(vis[0]);
    });
  });
}

function renderList() {
  const el = document.getElementById("varList");
  const vis = new Set(getVisibleIndices());
  el.innerHTML = VARIATIONS.map((v, i) => {
    const isStarred = stars.includes(v.id);
    const hidden = !vis.has(i);
    return `<div class="var-card${i===currentIndex?' active':''}${hidden?' hidden':''}" data-idx="${i}">
      <div class="card-num">V${String(i+1).padStart(2,"0")}${isStarred?' <span class="card-star">\u2605</span>':''}</div>
      <div class="card-title">${v.name}</div>
      <div class="card-desc">${v.desc}</div>
      <div class="card-tags">${v.tags.map(t=>`<span class="card-tag${t==='multi'?' mp':''}">${TAG_LABELS[t]||t}</span>`).join("")}</div>
    </div>`;
  }).join("");
  el.querySelectorAll(".var-card").forEach(c => {
    c.addEventListener("click", () => loadVariation(parseInt(c.dataset.idx)));
  });
  document.getElementById("totalCount").textContent = `${vis.size} of ${VARIATIONS.length} variations`;
}

function loadVariation(idx) {
  currentIndex = idx;
  const v = VARIATIONS[idx];
  const iframe = document.getElementById("viewer");
  iframe.classList.add("loading");
  iframe.src = v.path;
  iframe.onload = () => iframe.classList.remove("loading");
  // Update URL hash for shareable links
  history.replaceState(null, "", "#" + v.id);

  document.getElementById("counter").textContent = `${idx+1} of ${VARIATIONS.length}`;
  document.getElementById("varName").textContent = `V${String(idx+1).padStart(2,"0")} — ${v.name}`;
  document.getElementById("varDesc").textContent = v.desc;

  const starBtn = document.getElementById("starBtn");
  starBtn.className = "star-btn" + (stars.includes(v.id) ? " starred" : "");

  // Scroll active card into view
  renderList();
  const activeCard = document.querySelector(".var-card.active");
  if (activeCard) activeCard.scrollIntoView({block:"nearest",behavior:"smooth"});
}

function navigate(dir) {
  const vis = getVisibleIndices();
  if (!vis.length) return;
  const curPos = vis.indexOf(currentIndex);
  let next;
  if (curPos === -1) {
    next = dir > 0 ? 0 : vis.length - 1;
  } else {
    next = (curPos + dir + vis.length) % vis.length;
  }
  loadVariation(vis[next]);
}

function toggleStar() {
  const v = VARIATIONS[currentIndex];
  const idx = stars.indexOf(v.id);
  if (idx >= 0) stars.splice(idx, 1); else stars.push(v.id);
  localStorage.setItem("go2-stars", JSON.stringify(stars));
  document.getElementById("starBtn").className = "star-btn" + (stars.includes(v.id) ? " starred" : "");
  renderList();
  const activeCard = document.querySelector(".var-card.active");
  if (activeCard) activeCard.scrollIntoView({block:"nearest",behavior:"smooth"});
}

function openInTab() {
  window.open(VARIATIONS[currentIndex].path, "_blank");
}

// Keyboard
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "ArrowLeft") { e.preventDefault(); navigate(-1); }
  else if (e.key === "ArrowRight") { e.preventDefault(); navigate(1); }
  else if (e.key === "s" || e.key === "S") { e.preventDefault(); toggleStar(); }
  else if (e.key === "f" || e.key === "F") {
    e.preventDefault();
    activeFilter = activeFilter === "starred" ? "all" : "starred";
    renderFilters(); renderList();
    const vis = getVisibleIndices();
    if (vis.length && !vis.includes(currentIndex)) loadVariation(vis[0]);
  }
});

// Touch/swipe on main area
document.querySelector(".main").addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.querySelector(".main").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    navigate(dx < 0 ? 1 : -1);
  }
}, {passive:true});

// Jump-to-number input (supports position # or variation ID like "v481")
document.getElementById("jumpInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const val = e.target.value.trim().toLowerCase();
    // Try matching variation ID first (e.g. "v481", "501")
    let idx = VARIATIONS.findIndex(v => v.id === val || v.id === "v" + val);
    if (idx >= 0) {
      activeFilter = "all"; renderFilters();
      loadVariation(idx);
      e.target.value = "";
      e.target.blur();
      return;
    }
    // Also search by name substring
    idx = VARIATIONS.findIndex(v => v.name.toLowerCase().includes(val));
    if (idx >= 0) {
      activeFilter = "all"; renderFilters();
      loadVariation(idx);
      e.target.value = "";
      e.target.blur();
      return;
    }
    // Fall back to position number
    const num = parseInt(val);
    if (num >= 1 && num <= VARIATIONS.length) {
      loadVariation(num - 1);
      e.target.value = "";
      e.target.blur();
    }
  }
});

// Init
renderFilters();
renderList();
// Load from URL hash if present (e.g., #v51 or #super-01)
const hashId = location.hash.replace("#", "");
const hashIdx = hashId ? VARIATIONS.findIndex(v => v.id === hashId) : -1;
loadVariation(hashIdx >= 0 ? hashIdx : 0);
</script>
</body>
