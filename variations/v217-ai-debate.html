<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great AI Debate - Go2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.stage{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;width:100%;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:36px;font-weight:900;background:linear-gradient(135deg,#ff3366,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:#666;font-size:14px}
.versus{display:flex;justify-content:center;gap:40px;padding:20px 0;margin-bottom:10px}
.debater{text-align:center;padding:16px 24px;border-radius:16px;min-width:180px}
.debater.skeptic{background:rgba(255,51,102,0.1);border:1px solid rgba(255,51,102,0.3)}
.debater.optimist{background:rgba(0,204,255,0.1);border:1px solid rgba(0,204,255,0.3)}
.debater-avatar{font-size:40px;margin-bottom:6px}
.debater-name{font-weight:700;font-size:16px}
.debater.skeptic .debater-name{color:#ff3366}
.debater.optimist .debater-name{color:#00ccff}
.debater-title{font-size:11px;color:#666;margin-top:2px}
.score-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:0 0 10px;background:#1a1a2e}
.score-skeptic{background:linear-gradient(90deg,#ff3366,#ff6699);transition:width 0.5s;height:100%}
.score-optimist{background:linear-gradient(90deg,#0088cc,#00ccff);transition:width 0.5s;height:100%}
.score-labels{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:10px}
.chat-area{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.message{max-width:75%;padding:16px 20px;border-radius:16px;animation:slideIn 0.4s ease-out;position:relative;font-size:14px;line-height:1.6}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.message.skeptic{align-self:flex-start;background:rgba(255,51,102,0.1);border:1px solid rgba(255,51,102,0.2);border-bottom-left-radius:4px}
.message.optimist{align-self:flex-end;background:rgba(0,204,255,0.1);border:1px solid rgba(0,204,255,0.2);border-bottom-right-radius:4px}
.message .speaker{font-size:11px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.message.skeptic .speaker{color:#ff3366}
.message.optimist .speaker{color:#00ccff}
.message .stat{background:rgba(255,255,255,0.05);padding:8px 12px;border-radius:8px;margin:8px 0;font-size:13px;border-left:3px solid}
.message.skeptic .stat{border-color:#ff3366}
.message.optimist .stat{border-color:#00ccff}
.message.system{align-self:center;background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.2);text-align:center;max-width:90%;font-size:13px;color:#ffcc00}
.message.conclusion{align-self:center;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);text-align:center;max-width:90%;font-size:15px;color:#00ff88;padding:24px}
.typing{display:flex;gap:4px;padding:20px;align-self:flex-start}
.typing.right{align-self:flex-end}
.typing-dot{width:8px;height:8px;border-radius:50%;background:#555;animation:typing 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.controls{padding:16px 0;display:flex;gap:10px}
.ask-btn{flex:1;padding:14px;border-radius:12px;border:1px solid rgba(255,204,0,0.3);background:rgba(255,204,0,0.1);color:#ffcc00;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s}
.ask-btn:hover{background:rgba(255,204,0,0.2);transform:translateY(-1px)}
.ask-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.next-btn{padding:14px 32px;border-radius:12px;border:none;background:linear-gradient(135deg,#00ccff,#00ff88);color:#000;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,204,255,0.3)}
.next-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.question-panel{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,204,0,0.3);border-radius:16px;padding:20px;width:90%;max-width:500px;display:none;z-index:10}
.question-panel h3{color:#ffcc00;margin-bottom:12px;font-size:15px}
.question-option{padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);margin-bottom:8px;cursor:pointer;font-size:13px;transition:all 0.2s;color:#ccc}
.question-option:hover{background:rgba(255,204,0,0.1);border-color:rgba(255,204,0,0.3);color:#fff}
.round-badge{text-align:center;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:3px;padding:16px}
</style>
</head>
<body>
<div class="stage">
  <div class="header">
    <h1>The Great AI Debate</h1>
    <p>Two AI personas argue whether AI implementation can actually work at your company</p>
  </div>
  <div class="versus">
    <div class="debater skeptic">
      <div class="debater-avatar">🤨</div>
      <div class="debater-name">The Skeptic</div>
      <div class="debater-title">Chief Reality Officer</div>
    </div>
    <div style="display:flex;align-items:center;font-size:24px;font-weight:900;color:#333">VS</div>
    <div class="debater optimist">
      <div class="debater-avatar">💡</div>
      <div class="debater-name">The Optimist</div>
      <div class="debater-title">AI Transformation Lead</div>
    </div>
  </div>
  <div class="score-labels">
    <span>Skeptic: <span id="skepticScore">50</span>%</span>
    <span>Audience Conviction</span>
    <span>Optimist: <span id="optimistScore">50</span>%</span>
  </div>
  <div class="score-bar">
    <div class="score-skeptic" id="skepticBar" style="width:50%"></div>
    <div class="score-optimist" id="optimistBar" style="width:50%"></div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="controls">
    <button class="ask-btn" id="askBtn" onclick="showQuestions()">💬 Ask a Question</button>
    <button class="next-btn" id="nextBtn" onclick="advance()">Continue Debate →</button>
  </div>
</div>
<div class="question-panel" id="questionPanel">
  <h3>🎤 Ask the debaters:</h3>
  <div id="questionOptions"></div>
</div>

<script>
const chat = document.getElementById('chat');
let currentRound = 0;
let score = {skeptic: 50, optimist: 50};
let isAnimating = false;
let debateComplete = false;

const rounds = [
  {
    round: 'Opening Statements',
    messages: [
      {side:'skeptic', text:`Let's start with the uncomfortable truth. <b>95% of AI projects fail.</b> That's not my opinion — that's from MIT, McKinsey, and Gartner combined.`, stat:'MIT Sloan: "Most AI projects never make it past the pilot phase."'},
      {side:'optimist', text:`I don't disagree with that statistic. In fact, I think it's the most important number in this entire debate. The question isn't <i>whether</i> AI works — it's <i>why</i> it keeps failing.`},
      {side:'skeptic', text:`It fails because it's overhyped. Companies throw millions at LLMs and "AI strategy" consultants, then wonder why nothing changed. The tech isn't ready.`, stat:'Accenture: Companies spent $1.2T on AI in 2024. ROI was negative for 72%.'},
      {side:'optimist', text:`The tech is more than ready. The problem is <b>context</b>. Every failed AI project has one thing in common: the AI didn't understand how the company actually works. You can't automate what you haven't mapped.`}
    ],
    scoreShift: {skeptic: 55, optimist: 45}
  },
  {
    round: 'Round 1: The Context Problem',
    messages: [
      {side:'skeptic', text:`"Context" — I love that buzzword. So you're saying if we just give AI more data, it'll magically fix everything? Companies have <i>mountains</i> of data and AI still fails.`},
      {side:'optimist', text:`Data isn't context. Your CRM has data. Your JIRA has data. But <b>none of it captures how Sarah in ops actually processes invoices</b> — the 14 browser tabs, the manual copy-paste, the workarounds she invented because the official process is broken.`},
      {side:'skeptic', text:`So... you're talking about surveillance? Recording workers? That's a dystopian nightmare, not a solution.`, stat:'Harvard Business Review: "Employee monitoring destroys trust and reduces productivity by 15-20%"'},
      {side:'optimist', text:`That's the old paradigm. Go2 uses a consent-based desktop agent — <b>Cowork.ai</b>. Workers opt in. The agent observes work patterns, documents processes automatically, and then <i>coaches</i> workers in real-time. It's not a camera watching you. It's an AI copilot riding shotgun.`, stat:'Go2 pilot data: 94% employee opt-in rate. Satisfaction scores increase 23% within 8 weeks.'}
    ],
    scoreShift: {skeptic: 48, optimist: 52}
  },
  {
    round: 'Round 2: The Proof',
    messages: [
      {side:'skeptic', text:`Pilot data from your own company. How convenient. Every AI vendor has miraculous pilot results. Show me a 500-person company that actually transformed.`},
      {side:'optimist', text:`Fair challenge. Here's what's different: traditional AI vendors ask "what do you want to automate?" Go2 says "let us watch first, then we'll tell YOU what to automate." The AI discovers the opportunities that humans can't even see.`},
      {side:'skeptic', text:`And how long does this "watching" take? Six months of observation before any ROI? Most companies don't have that patience.`, stat:'Forrester: "Average time to first AI ROI in enterprise: 14-18 months"'},
      {side:'optimist', text:`Two weeks. Go2's agent identifies automatable processes within 14 days. Real-time coaching starts on day one. The first automations deploy in month two. Because the agent is learning <i>actual work</i>, not what managers <i>think</i> work looks like.`, stat:'Average Go2 deployment: First automation deployed by week 8. Coaching active by day 1. Full process map by day 14.'}
    ],
    scoreShift: {skeptic: 42, optimist: 58}
  },
  {
    round: 'Round 3: The Killer Argument',
    messages: [
      {side:'skeptic', text:`Okay, I'll concede the timeline sounds better. But here's my real concern: AI is going to replace these workers. You're building a system that learns jobs so AI can take them.`},
      {side:'optimist', text:`This is the most important misconception to address. Go2 doesn't replace workers — it <b>amplifies</b> them. When you automate the 30% of Sarah's job that's mindless copy-paste, Sarah doesn't get fired. Sarah becomes <b>the expert who trains the next 10 AI agents</b>.`},
      {side:'optimist', text:`Here's the secret nobody talks about: your employees are the only source of truth about how your business actually works. Their knowledge is the moat. Go2 captures that knowledge, makes the worker <i>more</i> valuable, and creates AI that actually works because it learned from reality.`},
      {side:'skeptic', text:`... I'm listening. But what about the 95% failure rate? How does Go2 avoid that?`},
      {side:'optimist', text:`Because every single one of those failures started by building AI in a vacuum. They hired ML engineers, bought GPU clusters, trained models — and never once observed how the actual work gets done. Go2 flips the script entirely: <b>observe first, automate second, coach always</b>.`, stat:'The Go2 methodology: 1) Observe real work, 2) Document automatically, 3) Coach in real-time, 4) Automate proven patterns, 5) Train AI agents on captured reality'}
    ],
    scoreShift: {skeptic: 30, optimist: 70}
  },
  {
    round: 'Closing Statements',
    messages: [
      {side:'skeptic', text:`I came into this debate expecting another AI snake oil pitch. I'll admit — the approach is fundamentally different. Starting with observation instead of implementation... that's not how anyone else does it.`},
      {side:'optimist', text:`And that's exactly why the 95% are failing. They're all doing the same thing and expecting different results. Go2 is the first platform that asks the only question that matters: <b>"How does work actually happen here?"</b>`},
      {side:'skeptic', text:`I still have reservations about long-term adoption and privacy. But I can't argue with the core logic: you can't automate what you don't understand, and nobody actually understands their own processes. If Go2 actually captures that... it changes the equation.`},
      {side:'conclusion', text:`<b>The verdict:</b> The Skeptic acknowledges that Go2's observe-first approach is fundamentally different from the AI implementations that produce the 95% failure rate. The key insight: <b>context is the missing ingredient</b>, and Go2 is the first platform designed to capture it.<br><br><a href="#" style="color:#00ff88;font-weight:700;font-size:16px">→ See how Go2 captures your company's context</a>`}
    ],
    scoreShift: {skeptic: 22, optimist: 78}
  }
];

const questions = [
  {q:'What about employee privacy?', responses:[
    {side:'skeptic',text:'Exactly my concern. Any system that watches workers is inherently invasive.'},
    {side:'optimist',text:'Go2 is privacy-first by design. Workers control what\'s captured. Data is anonymized for team-level insights. Individual coaching stays private. And everything is on-premise — your data never leaves your infrastructure.'}
  ]},
  {q:'How is this different from time tracking?', responses:[
    {side:'skeptic',text:'It sounds like sophisticated surveillance to me. Time tracking with extra steps.'},
    {side:'optimist',text:'Time tracking measures <i>hours</i>. Go2 understands <i>work</i>. A time tracker tells you Sarah spent 4 hours on invoices. Go2 tells you Sarah uses 14 steps, 3 are redundant, the approval bottleneck costs 2 days, and the whole process can be automated. That\'s the difference between a stopwatch and an X-ray.'}
  ]},
  {q:'What\'s the actual cost?', responses:[
    {side:'skeptic',text:'Here it comes — the enterprise sales pitch with the hidden six-figure price tag.'},
    {side:'optimist',text:'Go2 typically costs less than a single consultant. And unlike consultants who produce a PDF and leave, Go2 keeps learning, keeps coaching, keeps finding savings. The average deployment identifies 10-15x its cost in automation opportunities within the first 90 days.'}
  ]},
  {q:'Can it really work for MY industry?', responses:[
    {side:'skeptic',text:'Every vendor says "works for any industry." That usually means "works for none."'},
    {side:'optimist',text:'Go2 doesn\'t care about your industry — it cares about your <i>work patterns</i>. Whether you\'re in healthcare, finance, or manufacturing, the agent watches how people actually use their tools and finds the same patterns: redundant steps, knowledge silos, automatable routines. Work is work.'}
  ]}
];
let usedQuestions = new Set();

function addMessage(msg) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = `message ${msg.side}`;
    let html = '';
    if (msg.side !== 'system' && msg.side !== 'conclusion') {
      html += `<div class="speaker">${msg.side === 'skeptic' ? '🤨 The Skeptic' : '💡 The Optimist'}</div>`;
    }
    html += msg.text;
    if (msg.stat) html += `<div class="stat">${msg.stat}</div>`;
    div.innerHTML = html;
    div.style.opacity = '0';
    chat.appendChild(div);
    requestAnimationFrame(() => {
      div.style.opacity = '1';
      chat.scrollTop = chat.scrollHeight;
    });
    setTimeout(resolve, 200);
  });
}

function showTyping(side) {
  const div = document.createElement('div');
  div.className = `typing ${side === 'optimist' ? 'right' : ''}`;
  div.id = 'currentTyping';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('currentTyping');
  if (t) t.remove();
}

function updateScore(s, o) {
  score.skeptic = s;
  score.optimist = o;
  document.getElementById('skepticScore').textContent = s;
  document.getElementById('optimistScore').textContent = o;
  document.getElementById('skepticBar').style.width = s + '%';
  document.getElementById('optimistBar').style.width = o + '%';
}

async function advance() {
  if (isAnimating || debateComplete) return;
  if (currentRound >= rounds.length) return;

  isAnimating = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('askBtn').disabled = true;

  const round = rounds[currentRound];

  // Round badge
  const badge = document.createElement('div');
  badge.className = 'round-badge';
  badge.textContent = `— ${round.round} —`;
  chat.appendChild(badge);
  chat.scrollTop = chat.scrollHeight;

  for (const msg of round.messages) {
    showTyping(msg.side);
    await new Promise(r => setTimeout(r, 800 + Math.random() * 1200));
    removeTyping();
    await addMessage(msg);
    await new Promise(r => setTimeout(r, 300));
  }

  updateScore(round.scoreShift.skeptic, round.scoreShift.optimist);
  currentRound++;

  if (currentRound >= rounds.length) {
    debateComplete = true;
    document.getElementById('nextBtn').textContent = 'Debate Complete ✓';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('askBtn').disabled = true;
  } else {
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('askBtn').disabled = false;
  }
  isAnimating = false;
}

function showQuestions() {
  if (isAnimating || debateComplete) return;
  const panel = document.getElementById('questionPanel');
  const opts = document.getElementById('questionOptions');
  opts.innerHTML = '';
  questions.forEach((q, i) => {
    if (usedQuestions.has(i)) return;
    const div = document.createElement('div');
    div.className = 'question-option';
    div.textContent = q.q;
    div.onclick = () => askQuestion(i);
    opts.appendChild(div);
  });
  if (opts.children.length === 0) {
    opts.innerHTML = '<div style="color:#666;padding:12px">No more questions available</div>';
  }
  panel.style.display = 'block';
}

async function askQuestion(idx) {
  document.getElementById('questionPanel').style.display = 'none';
  usedQuestions.add(idx);
  isAnimating = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('askBtn').disabled = true;

  const q = questions[idx];
  await addMessage({side: 'system', text: `🎤 Audience asks: "${q.q}"`});
  await new Promise(r => setTimeout(r, 500));

  for (const resp of q.responses) {
    showTyping(resp.side);
    await new Promise(r => setTimeout(r, 1000 + Math.random() * 800));
    removeTyping();
    await addMessage(resp);
    await new Promise(r => setTimeout(r, 300));
  }

  // Slight shift toward optimist for each question
  score.optimist = Math.min(score.optimist + 3, 85);
  score.skeptic = 100 - score.optimist;
  updateScore(score.skeptic, score.optimist);

  document.getElementById('nextBtn').disabled = false;
  document.getElementById('askBtn').disabled = false;
  isAnimating = false;
}

// Close question panel on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('questionPanel');
  const btn = document.getElementById('askBtn');
  if (!panel.contains(e.target) && e.target !== btn) {
    panel.style.display = 'none';
  }
});

// Auto-start first round
setTimeout(() => advance(), 800);
</script>
</body>
</html>
