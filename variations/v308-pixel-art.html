<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 — Pixel Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden;image-rendering:pixelated}
h1{font-size:clamp(1.5rem,4vw,2.5rem);margin:1.5rem 0 0.5rem;text-align:center;letter-spacing:0.1em;text-shadow:3px 3px 0 #16213e}
.sub{color:#888;text-align:center;margin-bottom:1rem;font-size:0.85rem}
canvas{border:3px solid #0f3460;border-radius:4px;cursor:pointer;max-width:95vw}
.speech-bubble{position:fixed;background:#0f3460;border:2px solid #e94560;padding:0.8rem 1rem;border-radius:0 8px 8px 8px;font-size:0.85rem;max-width:280px;color:#eee;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;line-height:1.4}
.speech-bubble::before{content:'';position:absolute;top:-8px;left:0;border:4px solid transparent;border-bottom-color:#e94560;border-right-color:#e94560}
.tips{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:1rem;padding:0 1rem}
.tip{padding:0.5rem 1rem;background:#16213e;border:1px solid #0f3460;border-radius:4px;font-size:0.75rem;color:#aaa}
.tip span{color:#e94560}
.legend{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin-top:1rem;font-size:0.75rem;color:#888}
.legend i{display:inline-block;width:10px;height:10px;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>
<h1>PIXEL PRODUCTIVITY</h1>
<p class="sub">Click workers to see Go2 coaching in action</p>
<canvas id="c" width="640" height="400"></canvas>
<div class="speech-bubble" id="bubble"></div>
<div class="legend">
<span><i style="background:#4ade80"></i>Coached (productive)</span>
<span><i style="background:#f59e0b"></i>Context switching</span>
<span><i style="background:#ef4444"></i>Stuck/blocked</span>
<span><i style="background:#60a5fa"></i>Deep work</span>
</div>
<div class="tips">
<div class="tip"><span>2M+</span> pixel workers coached</div>
<div class="tip"><span>89%</span> satisfaction</div>
<div class="tip"><span>$0</span> surveillance vibes</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const bubble=document.getElementById('bubble');
const W=640,H=400;

const colors={
floor:'#16213e',desk:'#0f3460',screen:'#533483',
worker:'#e94560',hair:['#1a1a2e','#a78bfa','#f59e0b','#ef4444'],
coached:'#4ade80',switching:'#f59e0b',stuck:'#ef4444',deep:'#60a5fa'
};

const coachMessages=[
"Tip: You've been in 3 apps in 5 min. Try batching!",
"Nice! 2hr deep work streak. Keep going!",
"This report could be automated. Want me to help?",
"Your onboarding process just got documented!",
"Suggestion: Move standup to async — save 45min/day",
"You copy this data 3x/day. Let me automate it.",
"Context switch alert: 12 switches/hr. New record... bad record.",
"Great flow state detected. Holding notifications.",
"Process captured: client intake, 7 steps, 18 min avg",
"Your AI agent just learned your expense workflow!"
];

class Worker{
constructor(x,y,deskX){
this.x=x;this.y=y;this.deskX=deskX;
this.hair=colors.hair[Math.floor(Math.random()*colors.hair.length)];
this.state=['coached','deep','switching','stuck'][Math.floor(Math.random()*3)];
if(Math.random()>0.3)this.state='coached';
this.bobOff=Math.random()*Math.PI*2;
this.msg=coachMessages[Math.floor(Math.random()*coachMessages.length)];
this.typing=Math.random()>0.3;
this.typeFrame=0;
}
draw(t){
const bob=Math.sin(t*2+this.bobOff)*1;
// Desk
ctx.fillStyle=colors.desk;
ctx.fillRect(this.deskX,this.y+12,40,14);
// Screen
ctx.fillStyle=colors.screen;
ctx.fillRect(this.deskX+8,this.y+2,24,12);
// Screen glow
ctx.fillStyle=this.state==='deep'?'#60a5fa44':this.state==='stuck'?'#ef444444':'#4ade8044';
ctx.fillRect(this.deskX+9,this.y+3,22,10);
// Screen content pixels
for(let i=0;i<3;i++){
ctx.fillStyle='rgba(255,255,255,0.3)';
ctx.fillRect(this.deskX+11,this.y+5+i*3,18,1);
}
// Body
ctx.fillStyle=colors.worker;
ctx.fillRect(this.x,this.y+8+bob,8,12);
// Head
ctx.fillStyle='#fbbf24';
ctx.fillRect(this.x+1,this.y+2+bob,6,6);
// Hair
ctx.fillStyle=this.hair;
ctx.fillRect(this.x+1,this.y+1+bob,6,3);
// Status dot
ctx.fillStyle=colors[this.state];
ctx.fillRect(this.x+2,this.y-2,4,3);
// Typing animation
if(this.typing){
this.typeFrame++;
if(this.typeFrame%20<10){
ctx.fillStyle='#fff';
ctx.fillRect(this.deskX+12+(this.typeFrame%3)*5,this.y+14,3,2);
}
}
}
contains(mx,my){return mx>this.x-5&&mx<this.x+15&&my>this.y-5&&my<this.y+30;}
}

const workers=[];
const rows=[[80,120],[80,220],[80,320]];
for(let row=0;row<3;row++){
for(let col=0;col<5;col++){
const x=60+col*120;
const y=60+row*110;
workers.push(new Worker(x,y,x+14));
}
}

// Floor tiles
function drawFloor(){
ctx.fillStyle=colors.floor;
ctx.fillRect(0,0,W,H);
for(let x=0;x<W;x+=20){
for(let y=0;y<H;y+=20){
if((x/20+y/20)%2===0){
ctx.fillStyle='#1e2745';
ctx.fillRect(x,y,20,20);
}
}
}
}

// Plants
function drawPlants(){
const spots=[[10,50],[W-30,50],[10,180],[W-30,180],[10,300],[W-30,300]];
spots.forEach(([x,y])=>{
ctx.fillStyle='#6b4423';ctx.fillRect(x+4,y+8,6,6);
ctx.fillStyle='#22c55e';ctx.fillRect(x+2,y,10,10);
ctx.fillStyle='#16a34a';ctx.fillRect(x+4,y+2,6,6);
});
}

let t=0;
function draw(){
t+=0.016;
drawFloor();
drawPlants();
workers.forEach(w=>w.draw(t));
// Title bar
ctx.fillStyle='rgba(0,0,0,0.6)';
ctx.fillRect(0,0,W,20);
ctx.fillStyle='#4ade80';
ctx.font='10px Courier New';
ctx.fillText('GO2 OFFICE v1.0 — Click a worker!',8,14);
requestAnimationFrame(draw);
}
draw();

canvas.addEventListener('click',e=>{
const rect=canvas.getBoundingClientRect();
const scaleX=W/rect.width;
const scaleY=H/rect.height;
const mx=(e.clientX-rect.left)*scaleX;
const my=(e.clientY-rect.top)*scaleY;
let found=false;
workers.forEach(w=>{
if(w.contains(mx,my)){
found=true;
const screenX=e.clientX;
const screenY=e.clientY;
bubble.textContent=w.msg;
bubble.style.left=Math.min(screenX,window.innerWidth-300)+'px';
bubble.style.top=(screenY-80)+'px';
bubble.style.opacity='1';
w.msg=coachMessages[Math.floor(Math.random()*coachMessages.length)];
setTimeout(()=>bubble.style.opacity='0',3000);
}
});
});
</script>
</body>
</html>
