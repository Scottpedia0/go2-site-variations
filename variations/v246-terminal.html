const output=document.getElementById('output'),input=document.getElementById('input'),DELAY=15;
let history=[],histIdx=-1,isProcessing=false;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function addOutput(html){
  const div=document.createElement('div');
  div.className='cmd-output';
  div.innerHTML=html;
  output.appendChild(div);
  output.scrollTop=output.scrollHeight;
}

async function typeOutput(lines,speed=DELAY){
  const div=document.createElement('div');
  div.className='cmd-output';
  output.appendChild(div);
  for(const line of lines){
    div.innerHTML+=line+'\n';
    output.scrollTop=output.scrollHeight;
    await sleep(speed);
  }
  return div;
}

function progressBar(pct,width=30,filled='#27c93f',empty='#333'){
  const f=Math.round(pct/100*width);
  let bar='<span style="color:'+filled+'">';
  for(let i=0;i<f;i++)bar+='█';
  bar+='</span><span style="color:'+empty+'">';
  for(let i=f;i<width;i++)bar+='░';
  bar+='</span>';
  return bar+' '+pct+'%';
}

async function animateProgress(div,label,duration=2000,width=30){
  const steps=20;
  const interval=duration/steps;
  for(let i=0;i<=steps;i++){
    const pct=Math.round(i/steps*100);
    div.innerHTML=label+' '+progressBar(pct,width);
    output.scrollTop=output.scrollHeight;
    await sleep(interval);
  }
}

function table(headers,rows,colors=[]){
  const colW=headers.map((h,i)=>Math.max(h.length,...rows.map(r=>(r[i]||'').length))+2);
  let sep='┼',top='┬',bot='┴';
  const hLine=colW.map(w=>'─'.repeat(w));
  const topLine='┌'+hLine.join('┬')+'┐';
  const midLine='├'+hLine.join('┼')+'┤';
  const botLine='└'+hLine.join('┴')+'┘';
  let out=topLine+'\n│';
  headers.forEach((h,i)=>{out+='<span class="c-bold c-cyan"> '+h.padEnd(colW[i]-1)+'</span>│'});
  out+='\n'+midLine+'\n';
  rows.forEach(row=>{
    out+='│';
    row.forEach((cell,i)=>{
      const c=colors[i]||'c-white';
      out+='<span class="'+c+'"> '+(cell||'').padEnd(colW[i]-1)+'</span>│';
    });
    out+='\n';
  });
  out+=botLine;
  return out;
}

async function processCommand(cmd){
  const trimmed=cmd.trim().toLowerCase();
  if(!trimmed)return;
  addOutput('<span class="c-green">go2@workspace:~$</span> '+esc(cmd));

  if(eggs[trimmed]){await eggs[trimmed]();return}

  // Handle deploy-agent with args
  if(trimmed.startsWith('go2 deploy-agent')){
    const agentName=trimmed.replace('go2 deploy-agent','').trim()||'custom-agent';
    await commands['go2 deploy-agent'](agentName);
    return;
  }

  if(commands[trimmed]){await commands[trimmed]();return}

  addOutput(`<span class="c-red">Command not found: ${esc(cmd)}</span>\n<span class="c-dim">Type <span class="c-green">help</span> to see available commands.</span>`);
}

input.addEventListener('keydown',async(e)=>{
  if(e.key==='Enter'&&!isProcessing){
    isProcessing=true;
    const cmd=input.value;
    if(cmd.trim())history.unshift(cmd);
    histIdx=-1;
    input.value='';
    await processCommand(cmd);
    isProcessing=false;
    input.focus();
  }
  if(e.key==='ArrowUp'){e.preventDefault();if(histIdx<history.length-1){histIdx++;input.value=history[histIdx]}}
  if(e.key==='ArrowDown'){e.preventDefault();if(histIdx>0){histIdx--;input.value=history[histIdx]}else{histIdx=-1;input.value=''}}
});

document.addEventListener('click',()=>input.focus());
