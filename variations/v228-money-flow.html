<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 — Where Your Money Goes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
body{background:#0a0e17;color:#c8d6e5;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:40px 24px 20px}
h1{font-size:36px;font-weight:800;color:#fff}
h1 span{color:#00ff87}
.subtitle{color:#4a6fa5;font-size:13px;font-family:'JetBrains Mono',monospace;margin-top:8px}
.controls{display:flex;justify-content:center;gap:16px;margin:20px 0 10px;flex-wrap:wrap}
.controls label{font-size:11px;color:#4a6fa5;text-transform:uppercase;letter-spacing:1px}
.controls input{background:#111827;border:1px solid #1e293b;border-radius:6px;padding:8px 12px;color:#fff;font-size:14px;font-family:'JetBrains Mono',monospace;width:140px;text-align:right;outline:none}
.controls input:focus{border-color:#00ff87}
.controls .group{display:flex;flex-direction:column;gap:4px}
.toggle-row{display:flex;justify-content:center;gap:12px;margin:16px 0}
.toggle-btn{background:#111827;border:1px solid #1e293b;border-radius:20px;padding:8px 20px;font-size:12px;color:#8892b0;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.toggle-btn.active{background:#00ff8722;border-color:#00ff87;color:#00ff87}
#canvas-container{position:relative;width:100%;max-width:1200px;margin:0 auto;height:600px}
canvas{width:100%;height:100%}
.tooltip{position:absolute;background:#1a2332;border:1px solid #2a3a52;border-radius:8px;padding:12px 16px;pointer-events:none;display:none;font-size:12px;color:#c8d6e5;z-index:10;max-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tooltip .tt-title{font-weight:700;color:#fff;margin-bottom:4px;font-size:14px}
.tooltip .tt-amount{font-family:'JetBrains Mono',monospace;color:#00ff87;font-size:16px;font-weight:700}
.tooltip .tt-pct{color:#4a6fa5;font-size:11px;margin-top:2px}
.tooltip .tt-desc{color:#8892b0;margin-top:8px;line-height:1.5}
.legend{display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap;padding:0 24px 40px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#8892b0}
.legend-dot{width:12px;height:12px;border-radius:3px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1000px;margin:0 auto 40px;padding:0 24px}
.stat-card{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:20px;text-align:center}
.stat-card .val{font-size:28px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace}
.stat-card .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#4a6fa5;margin-top:4px}
.stat-card.highlight .val{color:#00ff87}
</style>
</head>
<body>
<div class="header">
  <h1>Where Your <span>Money</span> Goes</h1>
  <div class="subtitle">Interactive payroll flow visualization &mdash; see where value leaks, and how Go2 recovers it</div>
</div>
<div class="controls">
  <div class="group"><label>Annual Payroll</label><input type="text" id="payroll" value="2,000,000"></div>
  <div class="group"><label>Team Size</label><input type="number" id="team" value="30"></div>
  <div class="group"><label>Industry</label><select id="industry" style="background:#111827;border:1px solid #1e293b;border-radius:6px;padding:8px 12px;color:#fff;font-size:14px;outline:none"><option>Technology</option><option>Healthcare</option><option>Finance</option><option>Retail</option><option>Manufacturing</option></select></div>
</div>
<div class="toggle-row">
  <button class="toggle-btn active" id="btn-before" onclick="setMode('before')">Before Go2</button>
  <button class="toggle-btn" id="btn-after" onclick="setMode('after')">With Go2</button>
</div>
<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>
<div class="stats-row" id="stats-row"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00ff87"></div>Productive Work</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff5252"></div>Wasted Time</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd54f"></div>Automatable Tasks</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64b5f6"></div>Communication Overhead</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e040fb"></div>Recovered by Go2</div>
</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
let W,H,mode='before',payroll=2000000,animT=0;
let particles=[];
let nodes=[],links=[];
let hoverNode=null;

function resize(){
  const container=document.getElementById('canvas-container');
  W=canvas.width=container.clientWidth*2;
  H=canvas.height=container.clientHeight*2;
  ctx.scale(1,1);
  buildGraph();
}

const nodeDescs={
  'Total Payroll':'Your complete annual payroll spend across all employees.',
  'Productive Work':'Time spent on value-creating activities — core work that moves the business forward.',
  'Wasted Time':'Context switching, unnecessary meetings, unclear priorities, and idle time.',
  'Manual Tasks':'Repetitive processes that should be automated — data entry, report generation, manual approvals.',
  'Communication Overhead':'Excessive meetings, redundant status updates, searching for information, waiting on responses.',
  'Deep Focus Work':'Uninterrupted, high-value work on complex problems.',
  'Collaborative Work':'Effective teamwork, pair programming, productive brainstorming.',
  'Routine Execution':'Standard task completion — necessary but potentially optimizable.',
  'Recovered Value':'Time and money recovered through Go2 AI coaching, automation, and process optimization.',
  'Remaining Waste':'Residual inefficiency — Go2 continuously works to reduce this further.',
  'Automated':'Previously manual tasks now handled by AI agents trained on your team\'s actual work patterns.',
  'Optimized Comms':'Streamlined communication — fewer meetings, better async, AI-summarized updates.'
};

function buildGraph(){
  const p=payroll;
  if(mode==='before'){
    nodes=[
      {id:'payroll',label:'Total Payroll',val:p,x:.08,y:.5,color:'#fff',w:140},
      {id:'productive',label:'Productive Work',val:p*.58,x:.45,y:.2,color:'#00ff87',w:130},
      {id:'waste',label:'Wasted Time',val:p*.22,x:.45,y:.5,color:'#ff5252',w:120},
      {id:'manual',label:'Manual Tasks',val:p*.12,x:.45,y:.75,color:'#ffd54f',w:120},
      {id:'comms',label:'Comm. Overhead',val:p*.08,x:.45,y:.95,color:'#64b5f6',w:130},
      {id:'deep',label:'Deep Focus Work',val:p*.25,x:.82,y:.1,color:'#00ff87',w:130},
      {id:'collab',label:'Collaborative Work',val:p*.18,x:.82,y:.3,color:'#00ff87',w:140},
      {id:'routine',label:'Routine Execution',val:p*.15,x:.82,y:.5,color:'#00ff87',w:140},
    ];
    links=[
      {from:'payroll',to:'productive',val:p*.58,color:'#00ff8744'},
      {from:'payroll',to:'waste',val:p*.22,color:'#ff525244'},
      {from:'payroll',to:'manual',val:p*.12,color:'#ffd54f44'},
      {from:'payroll',to:'comms',val:p*.08,color:'#64b5f644'},
      {from:'productive',to:'deep',val:p*.25,color:'#00ff8733'},
      {from:'productive',to:'collab',val:p*.18,color:'#00ff8733'},
      {from:'productive',to:'routine',val:p*.15,color:'#00ff8733'},
    ];
  } else {
    nodes=[
      {id:'payroll',label:'Total Payroll',val:p,x:.08,y:.5,color:'#fff',w:140},
      {id:'productive',label:'Productive Work',val:p*.78,x:.42,y:.22,color:'#00ff87',w:130},
      {id:'waste',label:'Remaining Waste',val:p*.08,x:.42,y:.55,color:'#ff5252',w:130},
      {id:'recovered',label:'Recovered Value',val:p*.14,x:.42,y:.82,color:'#e040fb',w:130},
      {id:'deep',label:'Deep Focus Work',val:p*.35,x:.78,y:.1,color:'#00ff87',w:130},
      {id:'collab',label:'Collaborative Work',val:p*.22,x:.78,y:.3,color:'#00ff87',w:140},
      {id:'routine',label:'Routine Execution',val:p*.12,x:.78,y:.48,color:'#00ff87',w:140},
      {id:'auto',label:'Automated',val:p*.09,x:.78,y:.65,color:'#e040fb',w:110},
      {id:'optcomms',label:'Optimized Comms',val:p*.07,x:.78,y:.82,color:'#e040fb',w:140},
      {id:'reinvest',label:'Deep Focus Work',val:p*.05,x:.78,y:.95,color:'#e040fb',w:130},
    ];
    links=[
      {from:'payroll',to:'productive',val:p*.78,color:'#00ff8744'},
      {from:'payroll',to:'waste',val:p*.08,color:'#ff525244'},
      {from:'payroll',to:'recovered',val:p*.14,color:'#e040fb44'},
      {from:'productive',to:'deep',val:p*.35,color:'#00ff8733'},
      {from:'productive',to:'collab',val:p*.22,color:'#00ff8733'},
      {from:'productive',to:'routine',val:p*.12,color:'#00ff8733'},
      {from:'recovered',to:'auto',val:p*.09,color:'#e040fb33'},
      {from:'recovered',to:'optcomms',val:p*.07,color:'#e040fb33'},
    ];
  }
  particles=[];
  updateStats();
}

function updateStats(){
  const sr=document.getElementById('stats-row');
  if(mode==='before'){
    sr.innerHTML=`
      <div class="stat-card"><div class="val">58%</div><div class="label">Productive</div></div>
      <div class="stat-card"><div class="val" style="color:#ff5252">22%</div><div class="label">Wasted</div></div>
      <div class="stat-card"><div class="val" style="color:#ffd54f">12%</div><div class="label">Automatable</div></div>
      <div class="stat-card"><div class="val" style="color:#64b5f6">8%</div><div class="label">Comm Overhead</div></div>`;
  } else {
    const saved=Math.round(payroll*.2);
    sr.innerHTML=`
      <div class="stat-card highlight"><div class="val">78%</div><div class="label">Productive (+20%)</div></div>
      <div class="stat-card"><div class="val" style="color:#ff5252">8%</div><div class="label">Remaining Waste (-14%)</div></div>
      <div class="stat-card highlight"><div class="val">$${(saved/1000).toFixed(0)}K</div><div class="label">Annual Savings</div></div>
      <div class="stat-card highlight"><div class="val">14%</div><div class="label">Recovered by Go2</div></div>`;
  }
}

function setMode(m){
  mode=m;
  document.getElementById('btn-before').classList.toggle('active',m==='before');
  document.getElementById('btn-after').classList.toggle('active',m==='after');
  buildGraph();
}

function getNodePos(node){
  return{x:node.x*W/2,y:node.y*H/2};
}

function fmtMoney(v){
  if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M';
  if(v>=1000)return'$'+(v/1000).toFixed(0)+'K';
  return'$'+v;
}

function spawnParticles(){
  links.forEach(link=>{
    if(Math.random()>.15)return;
    const fromN=nodes.find(n=>n.id===link.from);
    const toN=nodes.find(n=>n.id===link.to);
    if(!fromN||!toN)return;
    const fp=getNodePos(fromN),tp=getNodePos(toN);
    const thickness=Math.max(2,(link.val/payroll)*30);
    const offset=(Math.random()-.5)*thickness;
    const angle=Math.atan2(tp.y-fp.y,tp.x-fp.x);
    const perpX=-Math.sin(angle)*offset;
    const perpY=Math.cos(angle)*offset;
    particles.push({
      x:fp.x+fromN.w/2*2,y:fp.y+perpY,
      tx:tp.x-toN.w/2*2,ty:tp.y+perpY,
      t:0,speed:.005+Math.random()*.008,
      color:link.color.replace('44',''),
      size:2+Math.random()*2
    });
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Links
  links.forEach(link=>{
    const fromN=nodes.find(n=>n.id===link.from);
    const toN=nodes.find(n=>n.id===link.to);
    if(!fromN||!toN)return;
    const fp=getNodePos(fromN),tp=getNodePos(toN);
    const thickness=Math.max(3,(link.val/payroll)*40);
    ctx.beginPath();
    const sx=fp.x+fromN.w,sy=fp.y;
    const ex=tp.x-toN.w,ey=tp.y;
    const cpx1=sx+(ex-sx)*.5,cpx2=sx+(ex-sx)*.5;
    ctx.moveTo(sx,sy);
    ctx.bezierCurveTo(cpx1,sy,cpx2,ey,ex,ey);
    ctx.strokeStyle=link.color;
    ctx.lineWidth=thickness;
    ctx.stroke();
  });

  // Particles
  spawnParticles();
  particles=particles.filter(p=>{
    p.t+=p.speed;
    if(p.t>=1)return false;
    const fromN=nodes.find(n=>n.id==='payroll');
    // Simple lerp with slight curve
    const t=p.t;
    const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const x=p.x+(p.tx-p.x)*ease;
    const y=p.y+(p.ty-p.y)*ease;
    ctx.beginPath();
    ctx.arc(x,y,p.size,0,Math.PI*2);
    const alpha=t<.1?t/.1:t>.9?1-(t-.9)/.1:1;
    ctx.fillStyle=p.color.replace('rgb','rgba').replace(')',`,${alpha})`);
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(x,y,p.size*3,0,Math.PI*2);
    ctx.fillStyle=p.color.replace('rgb','rgba').replace(')',`,${alpha*.15})`);
    ctx.fill();
    return true;
  });

  // Nodes
  nodes.forEach(node=>{
    const pos=getNodePos(node);
    const w=node.w,h=44;
    const isHover=hoverNode===node.id;
    // Box
    ctx.fillStyle=isHover?'#1a2332':'#111827';
    ctx.strokeStyle=isHover?node.color:'#1e293b';
    ctx.lineWidth=isHover?3:1.5;
    roundRect(ctx,pos.x-w,pos.y-h,w*2,h*2,8);
    ctx.fill();
    ctx.stroke();
    // Top accent
    ctx.fillStyle=node.color;
    ctx.fillRect(pos.x-w+1,pos.y-h+1,w*2-2,3);
    // Label
    ctx.fillStyle='#c8d6e5';
    ctx.font='500 20px Inter';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(node.label,pos.x,pos.y-8);
    // Value
    ctx.fillStyle=node.color;
    ctx.font='700 22px JetBrains Mono';
    ctx.fillText(fmtMoney(node.val),pos.x,pos.y+18);
  });

  animT++;
  requestAnimationFrame(draw);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Mouse interaction
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/2)/rect.width;
  const my=(e.clientY-rect.top)*(H/2)/rect.height;
  let found=null;
  nodes.forEach(node=>{
    const pos=getNodePos(node);
    if(mx>pos.x-node.w&&mx<pos.x+node.w&&my>pos.y-44&&my<pos.y+44){
      found=node;
    }
  });
  if(found){
    hoverNode=found.id;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX-canvas.parentElement.getBoundingClientRect().left+16)+'px';
    tooltip.style.top=(e.clientY-canvas.parentElement.getBoundingClientRect().top-10)+'px';
    const pct=((found.val/payroll)*100).toFixed(1);
    tooltip.innerHTML=`<div class="tt-title">${found.label}</div><div class="tt-amount">${fmtMoney(found.val)}</div><div class="tt-pct">${pct}% of total payroll</div><div class="tt-desc">${nodeDescs[found.label]||''}</div>`;
  } else {
    hoverNode=null;
    tooltip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>{hoverNode=null;tooltip.style.display='none'});

// Payroll input
document.getElementById('payroll').addEventListener('input',e=>{
  const v=parseInt(e.target.value.replace(/[^0-9]/g,''));
  if(v>0){payroll=v;buildGraph()}
});
document.getElementById('payroll').addEventListener('blur',e=>{
  e.target.value=payroll.toLocaleString();
});

window.addEventListener('resize',resize);
resize();
draw();
</script>
</body>
</html>
