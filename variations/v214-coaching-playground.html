<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 — Coaching Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--surface:#111827;--surface2:#1a2236;--border:#1e293b;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.divider{width:1px;height:24px;background:var(--border)}
.view-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:3px}
.view-btn{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none;font-family:inherit}
.view-btn.active{background:var(--accent);color:#fff}
.main-layout{display:flex;flex:1;overflow:hidden}
/* Left Panel - Persona Selector */
.left-panel{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--surface)}
.left-panel h3{padding:16px 20px 8px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.persona-list{flex:1;overflow-y:auto;padding:0 12px 12px}
.persona-card{padding:14px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent}
.persona-card:hover{background:var(--surface2)}
.persona-card.active{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3)}
.persona-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.persona-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.persona-name{font-size:13px;font-weight:600}
.persona-role{font-size:11px;color:var(--text3)}
.persona-preview{font-size:11px;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Intensity Slider */
.slider-section{padding:16px 20px;border-top:1px solid var(--border)}
.slider-section label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:block;margin-bottom:8px}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type="range"]{flex:1;-webkit-appearance:none;height:4px;background:var(--surface2);border-radius:2px;outline:none}
.slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.slider-val{font-size:13px;font-weight:600;color:var(--accent2);min-width:30px;text-align:right}
.intensity-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}
/* Timeline Selector */
.timeline-section{padding:16px 20px;border-top:1px solid var(--border)}
.timeline-tabs{display:flex;gap:4px;flex-wrap:wrap}
.timeline-tab{padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--text3);background:var(--surface2);transition:all .15s;border:none;font-family:inherit}
.timeline-tab.active{background:var(--accent);color:#fff}
.timeline-tab:hover:not(.active){color:var(--text)}
/* Right Panel - Feed */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.feed-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.feed-header h2{font-size:16px;font-weight:600}
.feed-meta{font-size:12px;color:var(--text3)}
.feed-scroll{flex:1;overflow-y:auto;padding:20px 24px}
/* Feed Items */
.feed-day{margin-bottom:28px}
.feed-day-header{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.feed-day-header::after{content:'';flex:1;height:1px;background:var(--border)}
.coach-msg{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:all .3s;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.coach-msg.highlight{border-color:var(--accent);background:rgba(99,102,241,.05)}
.coach-msg.alert{border-color:var(--orange);background:rgba(245,158,11,.05)}
.coach-msg.success{border-color:var(--green);background:rgba(34,197,94,.05)}
.coach-msg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.coach-msg-type{display:flex;align-items:center;gap:6px}
.coach-msg-icon{font-size:16px}
.coach-msg-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.coach-msg-label.nudge{color:var(--accent2)}
.coach-msg-label.insight{color:var(--orange)}
.coach-msg-label.win{color:var(--green)}
.coach-msg-label.tip{color:var(--text2)}
.coach-msg-label.alert{color:var(--red)}
.coach-msg-label.report{color:var(--accent2)}
.coach-msg-time{font-size:11px;color:var(--text3)}
.coach-msg-body{font-size:13px;line-height:1.7;color:var(--text2)}
.coach-msg-body strong{color:var(--text);font-weight:600}
.coach-msg-actions{display:flex;gap:8px;margin-top:12px}
.coach-action{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s;font-family:inherit}
.coach-action:hover{border-color:var(--accent);color:var(--text)}
.coach-action.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.coach-metric{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600;margin:2px}
.coach-metric.up{color:var(--green)}
.coach-metric.down{color:var(--red)}
.coach-metric.neutral{color:var(--text2)}
/* Manager view */
.manager-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.manager-summary h3{font-size:15px;font-weight:600;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.summary-stat{text-align:center;padding:12px;background:var(--surface2);border-radius:8px}
.summary-stat .val{font-size:18px;font-weight:700}
.summary-stat .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.team-coaching-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.3)}
.team-coaching-item:last-child{border:none}
.team-coaching-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.team-coaching-info{flex:1}
.team-coaching-name{font-size:13px;font-weight:500}
.team-coaching-detail{font-size:11px;color:var(--text3);margin-top:2px}
.team-coaching-score{font-size:14px;font-weight:700;min-width:40px;text-align:right}
.progress-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-bar-fill{height:100%;border-radius:2px;transition:width 1s}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<span class="logo">Go2</span>
<span class="divider"></span>
<span style="font-size:16px;font-weight:600">Coaching Playground</span>

<div class="view-toggle">

<button class="view-btn" data-view="manager" onclick="switchView('manager',this)">Manager View</button>

</div>
</div>

<div class="right-panel">

<div class="feed-meta" id="feed-meta"></div>
</div>
<div class="feed-scroll" id="feed-scroll"></div>
</div>
</div>

const timelines=['Week 1','Week 2','Month 1','Month 3'];
let currentPersona=null,currentTimeline='Week 1',currentView='worker',intensity=3;

function init(){
const list=document.getElementById('persona-list');
personas.forEach((p,i)=>{
const card=document.createElement('div');card.className='persona-card'+(i===0?' active':'');card.dataset.id=p.id;
card.innerHTML=`<div class="persona-top"><div class="persona-avatar" style="background:${p.color}">${p.icon}</div><div><div class="persona-name">${p.name}</div><div class="persona-role">${p.role}</div></div></div><div class="persona-preview">${p.desc}</div>`;
card.onclick=()=>selectPersona(p);
list.appendChild(card);
});
const tabs=document.getElementById('timeline-tabs');
timelines.forEach((t,i)=>{
const tab=document.createElement('button');tab.className='timeline-tab'+(i===0?' active':'');tab.textContent=t;
tab.onclick=()=>{document.querySelectorAll('.timeline-tab').forEach(x=>x.classList.remove('active'));tab.classList.add('active');currentTimeline=t;renderFeed()};
tabs.appendChild(tab);
});
selectPersona(personas[0]);
}

function selectPersona(p){
currentPersona=p;
document.querySelectorAll('.persona-card').forEach(c=>c.classList.remove('active'));
document.querySelector(`.persona-card[data-id="${p.id}"]`).classList.add('active');
renderFeed();
}

function switchView(view,btn){
currentView=view;
document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');renderFeed();
}

function updateIntensity(){
intensity=parseInt(document.getElementById('intensity-slider').value);
document.getElementById('intensity-val').textContent=intensity;
renderFeed();
}

function renderFeed(){
if(!currentPersona)return;
const scroll=document.getElementById('feed-scroll');
const title=document.getElementById('feed-title');
const meta=document.getElementById('feed-meta');

if(currentView==='manager'){
renderManagerView();return;
}

title.textContent=`${currentPersona.name} — ${currentPersona.role}`;
meta.textContent=`${currentTimeline} | Intensity: ${intensity}/5`;

const msgs=currentPersona.workerMsgs[currentTimeline]||[];
// Filter by intensity
let filtered=msgs;
if(intensity<=2)filtered=msgs.filter(m=>m.type==='win'||m.type==='report');
else if(intensity<=3)filtered=msgs.filter(m=>m.type!=='tip'||Math.random()>.3);
// intensity 4-5 shows all

scroll.innerHTML='';
const day=document.createElement('div');day.className='feed-day';
const dayLabel=currentTimeline.startsWith('Week')?'Typical Day':'Key Moments';
day.innerHTML=`<div class="feed-day-header">${dayLabel} &mdash; ${currentTimeline}</div>`;

filtered.forEach((m,i)=>{
const msgEl=document.createElement('div');
const cls=m.type==='win'?'success':m.type==='alert'?'alert':m.type==='insight'||m.type==='report'?'highlight':'';
msgEl.className=`coach-msg ${cls}`;
msgEl.style.animationDelay=i*0.15+'s';
const icons={nudge:'&#128161;',tip:'&#128736;',insight:'&#128202;',win:'&#127942;',alert:'&#9888;',report:'&#128203;'};
const labels={nudge:'Nudge',tip:'Productivity Tip',insight:'Insight',win:'Win',alert:'Alert',report:'Report'};
msgEl.innerHTML=`
<div class="coach-msg-header">
<div class="coach-msg-type"><span class="coach-msg-icon">${icons[m.type]}</span><span class="coach-msg-label ${m.type}">${labels[m.type]}</span></div>
<span class="coach-msg-time">${m.time}</span>
</div>
<div class="coach-msg-body">${m.body}</div>
${m.actions?`<div class="coach-msg-actions">${m.actions.map((a,j)=>`<button class="coach-action ${j===0?'primary':''}" onclick="this.textContent='Done!';this.style.background='var(--green)';this.style.borderColor='var(--green)';this.style.color='#fff'">${a}</button>`).join('')}</div>`:''}`;
day.appendChild(msgEl);
});

if(intensity>=4){
// Add extra messages at high intensity
const extras=[
{type:'tip',time:'Throughout Day',body:`<strong>Micro-coaching:</strong> Your posture changed — consider standing. | Tab switching detected — stay focused. | Great flow state — protecting it. | Break recommended — you've been coding for 2.5 hrs straight.`},
];
extras.forEach(m=>{
const msgEl=document.createElement('div');msgEl.className='coach-msg';
msgEl.innerHTML=`<div class="coach-msg-header"><div class="coach-msg-type"><span class="coach-msg-icon">&#128276;</span><span class="coach-msg-label tip">Micro-Coaching (Intensity ${intensity})</span></div></div><div class="coach-msg-body">${m.body}</div>`;
day.appendChild(msgEl);
});
}

scroll.appendChild(day);
}

function renderManagerView(){
const scroll=document.getElementById('feed-scroll');
const title=document.getElementById('feed-title');
const meta=document.getElementById('feed-meta');
title.textContent='Manager Dashboard — Team Coaching Overview';
meta.textContent=currentTimeline;

scroll.innerHTML='';
// Summary
const summary=document.createElement('div');summary.className='manager-summary';
summary.innerHTML=`
<h3>Team Coaching Summary — ${currentTimeline}</h3>
<div class="summary-grid">
<div class="summary-stat"><div class="val" style="color:var(--green)">84%</div><div class="lbl">Avg Efficiency</div></div>
<div class="summary-stat"><div class="val">92%</div><div class="lbl">Coaching Adoption</div></div>
<div class="summary-stat"><div class="val" style="color:var(--green)">+23%</div><div class="lbl">Productivity Gain</div></div>
<div class="summary-stat"><div class="val">47h</div><div class="lbl">Hours Saved</div></div>
</div>
<h4 style="font-size:13px;font-weight:600;margin-bottom:12px">Team Member Progress</h4>
${personas.map(p=>{
const score=65+Math.floor(Math.random()*30);
const change=Math.floor(Math.random()*20)-3;
const colors2=score>=80?'var(--green)':score>=65?'var(--orange)':'var(--red)';
return`<div class="team-coaching-item">
<div class="team-coaching-avatar" style="background:${p.color}">${p.icon}</div>
<div class="team-coaching-info">
<div class="team-coaching-name">${p.name} — ${p.role}</div>
<div class="team-coaching-detail">Focus: coaching adopted ${currentTimeline==='Month 3'?'fully':'partially'} | ${Math.floor(Math.random()*20)+5} coaching actions taken</div>
<div class="progress-track"><div class="progress-bar-fill" style="width:${score}%;background:${colors2}"></div></div>
</div>
<div class="team-coaching-score" style="color:${colors2}">${score}%</div>
</div>`;
}).join('')}`;
scroll.appendChild(summary);

// Manager insights
const insights=document.createElement('div');insights.className='feed-day';
insights.innerHTML=`<div class="feed-day-header">Manager Insights — ${currentTimeline}</div>`;
const mgrMsgs=[
{type:'report',time:'Monday 8 AM',body:`<strong>Team Weekly Brief:</strong> Overall team efficiency trending <span class="coach-metric up">+5%</span>. Top performer: Alex Rivera (95%). Needs attention: Jordan's meeting load is 4.2h/day — recommend async alternatives. Support team's auto-templates saving 14h/week across team.`,actions:['View details','Schedule 1:1s']},
{type:'insight',time:'Wednesday',body:`<strong>Cross-team pattern:</strong> Teams that adopted coaching at intensity 3+ showed <span class="coach-metric up">2.1x faster</span> productivity gains than intensity 1-2. Recommendation: increase coaching for Sales team from level 2 to level 3.`,actions:['Adjust team settings','Compare teams']},
{type:'alert',time:'Thursday',body:`<strong>Burnout risk detected:</strong> Morgan Kim has worked 9+ hours for 8 consecutive days during month-end close. Coaching suggests: automate remaining manual reconciliation tasks and enforce a hard stop at 6 PM.`,actions:['Review workload','Message Morgan']},
];
mgrMsgs.forEach(m=>{
const el=document.createElement('div');el.className=`coach-msg ${m.type==='alert'?'alert':'highlight'}`;
const icons={report:'&#128203;',insight:'&#128202;',alert:'&#9888;'};
el.innerHTML=`<div class="coach-msg-header"><div class="coach-msg-type"><span class="coach-msg-icon">${icons[m.type]}</span><span class="coach-msg-label ${m.type}">${m.type==='report'?'Team Report':m.type==='insight'?'Insight':'Alert'}</span></div><span class="coach-msg-time">${m.time}</span></div><div class="coach-msg-body">${m.body}</div><div class="coach-msg-actions">${m.actions.map((a,j)=>`<button class="coach-action ${j===0?'primary':''}" onclick="this.textContent='Done!';this.style.background='var(--green)';this.style.borderColor='var(--green)';this.style.color='#fff'">${a}</button>`).join('')}</div>`;
insights.appendChild(el);
});
scroll.appendChild(insights);
}

init();
</script>
</body>
</html>
