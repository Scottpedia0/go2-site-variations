<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 Website Variations Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e12;--card:#16161d;--border:#2a2a35;--text:#e0e0e6;--dim:#8888a0;--accent:#6c8cff;--accent2:#4ecdc4;--green:#34d399;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding:2rem;min-height:100vh}
a{color:inherit;text-decoration:none}

/* Header */
.header{text-align:center;padding:3rem 1rem 2rem;max-width:800px;margin:0 auto}
.header h1{font-size:2.4rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:0.5rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--dim);font-size:1.05rem;max-width:600px;margin:0 auto}
.header .stats{display:flex;gap:2rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.header .stat{text-align:center}
.header .stat .num{font-size:1.8rem;font-weight:700;color:#fff}
.header .stat .label{font-size:0.8rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em}

/* Filters */
.filters{max-width:1400px;margin:1.5rem auto 2rem;display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center}
.filter-btn{padding:0.45rem 1rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:inherit}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Search */
.search-wrap{max-width:500px;margin:0 auto 2rem;position:relative}
.search-wrap input{width:100%;padding:0.7rem 1rem 0.7rem 2.6rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap svg{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--dim)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;max-width:1400px;margin:0 auto;padding-bottom:4rem}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;transition:all 0.25s;position:relative;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,140,255,0.08)}
.card.building{opacity:0.45}
.card.building:hover{transform:none;border-color:var(--border);box-shadow:none}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.6rem}
.card-num{font-size:0.75rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em}
.card-badge{font-size:0.65rem;padding:0.2rem 0.55rem;border-radius:100px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.badge-single{background:rgba(108,140,255,0.12);color:var(--accent)}
.badge-multi{background:rgba(78,205,196,0.12);color:var(--accent2)}
.badge-building{background:rgba(245,158,11,0.12);color:var(--amber)}
.card h3{font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;color:#fff;letter-spacing:-0.01em}
.card p{font-size:0.85rem;color:var(--dim);flex:1;margin-bottom:0.8rem;line-height:1.55}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:0.7rem;border-top:1px solid var(--border)}
.card-size{font-size:0.75rem;color:var(--dim)}
.card-tags{display:flex;gap:0.35rem;flex-wrap:wrap}
.tag{font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--dim)}
.card-link{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.82rem;font-weight:500;color:var(--accent);transition:color 0.2s}
.card-link:hover{color:#fff}

/* Empty state */
.empty{text-align:center;padding:4rem 2rem;color:var(--dim);grid-column:1/-1;font-size:1.1rem}

@media(max-width:700px){
  body{padding:1rem}
  .header h1{font-size:1.8rem}
  .grid{grid-template-columns:1fr}
  .header .stats{gap:1rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>Go2 Website Variations</h1>
  <p>49 creative angles for the Go2.io website. Click any card to preview the variation.</p>
  <div class="stats">
    <div class="stat"><div class="num" id="total-count">49</div><div class="label">Total Variations</div></div>
    <div class="stat"><div class="num" id="built-count">0</div><div class="label">Built</div></div>
    <div class="stat"><div class="num" id="pending-count">0</div><div class="label">Pending</div></div>
  </div>
</div>

<div class="search-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" id="search" placeholder="Search variations..." autocomplete="off">
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="single">Single Page</button>
  <button class="filter-btn" data-filter="multi">Multi-Page</button>
  <button class="filter-btn" data-filter="agent">Agent-Focused</button>
  <button class="filter-btn" data-filter="no-tracking">No Time Tracking</button>
  <button class="filter-btn" data-filter="premium">Premium Positioning</button>
  <button class="filter-btn" data-filter="worker">Worker-First</button>
  <button class="filter-btn" data-filter="aggressive">Aggressive / Bold</button>
  <button class="filter-btn" data-filter="emotional">Emotional / Story</button>
  <button class="filter-btn" data-filter="roi">ROI / Numbers</button>
</div>

<div class="grid" id="grid"></div>

<script>

  {num:1,slug:"v01-dark-interactive",name:"Dark Interactive",desc:"Dark theme with animated counters and a chat-style AI coaching preview that lets visitors experience Go2 before signing up.",file:"v01-dark-interactive.html",size:"53 KB",built:true,type:"single",tags:["aggressive","emotional"]},
  {num:2,slug:"v02-intervention",name:"Intervention",desc:"Aggressive confrontational style with red accents. Forces visitors to confront their productivity dysfunction head-on.",file:"v02-intervention.html",size:"39 KB",built:true,type:"single",tags:["aggressive"]},
  {num:3,slug:"v03-calculator",name:"Calculator",desc:"Interactive waste calculator hero section. Visitors input their team size and see exactly how much money they're losing.",file:"v03-calculator.html",size:"22 KB",built:true,type:"single",tags:["roi"]},
  {num:4,slug:"v04-confession",name:"Confession",desc:"\"Yeah, we record everything\" lead with amber accent. Radical honesty about what Go2 captures and why it matters.",file:"v04-confession.html",size:"29 KB",built:true,type:"single",tags:["aggressive","no-tracking"]},
  {num:5,slug:"v05-minimalist",name:"Minimalist",desc:"Ultra-minimal design, 500 words max, huge whitespace. Proves you can sell a complex product with almost no copy.",file:"v05-minimalist.html",size:"6 KB",built:true,type:"single",tags:["premium"]},
  {num:6,slug:"v06-dashboard-demo",name:"Dashboard Demo",desc:"The homepage IS a simulated dashboard. Visitors interact with a live Go2 experience instead of reading about it.",file:"v06-dashboard-demo.html",size:"46 KB",built:true,type:"single",tags:["agent"]},
  {num:7,slug:"v07-founder-letter",name:"Founder Letter",desc:"The entire page is a founder letter in serif font. Personal, vulnerable, and direct about why Go2 exists.",file:"v07-founder-letter.html",size:"14 KB",built:true,type:"single",tags:["emotional"]},
  {num:8,slug:"v08-comparison-killer",name:"Comparison Killer",desc:"Built entirely around competitor demolition tables. Side-by-side proof that Go2 wins on every metric that matters.",file:"v08-comparison-killer.html",size:"41 KB",built:true,type:"single",tags:["aggressive","no-tracking"]},
  {num:9,slug:"v09-three-doors",name:"Three Doors",desc:"Three pain-based clickable paths. Visitors self-select their biggest problem and get a tailored pitch.",file:"v09-three-doors.html",size:"34 KB",built:true,type:"single",tags:["emotional"]},
  {num:10,slug:"v10-anti-saas",name:"Anti-SaaS",desc:"Brutalist monospace punk manifesto. Rejects every SaaS convention while making a compelling case for Go2.",file:"v10-anti-saas.html",size:"23 KB",built:true,type:"single",tags:["aggressive","no-tracking"]},
  {num:11,slug:"v11-waze-story",name:"Waze Story",desc:"Full Waze analogy narrative. Just as Waze crowdsources traffic data, Go2 crowdsources productivity intelligence.",file:"v11-waze-story.html",size:"28 KB",built:true,type:"single",tags:["emotional"]},
  {num:12,slug:"v12-worker-first",name:"Worker First",desc:"Sells to workers first, then pivots to managers. Flips the typical B2B playbook on its head.",file:"v12-worker-first.html",size:"32 KB",built:true,type:"single",tags:["worker","no-tracking"]},
  {num:13,slug:"v13-roi-machine",name:"ROI Machine",desc:"Everything framed in dollars. Every feature, every benefit, every section answers: how much money does this make or save?",file:"v13-roi-machine.html",size:"37 KB",built:true,type:"single",tags:["roi"]},
  {num:14,slug:"v14-agent-future",name:"Agent Future",desc:"All-in on the AI agents story. Positions Go2 as the platform where AI agents actually get work done.",file:"v14-agent-future.html",size:"35 KB",built:true,type:"single",tags:["agent"]},
  {num:15,slug:"v15-premium",name:"Premium",desc:"Luxury positioning: Tesla, not Honda. High-end design with premium pricing confidence and aspirational messaging.",file:"v15-premium.html",size:"40 KB",built:true,type:"single",tags:["premium"]},
  {num:16,slug:"v16-before-after",name:"Before / After",desc:"Split-screen before/after scenarios showing the stark contrast between companies with and without Go2.",file:"v16-before-after.html",size:"23 KB",built:true,type:"single",tags:["emotional"]},
  {num:17,slug:"v17-video-pitch",name:"Video Pitch",desc:"Video placeholder hero with minimal text. Bets everything on a compelling demo video doing the selling.",file:"v17-video-pitch.html",size:"9 KB",built:true,type:"single",tags:[]},
  {num:18,slug:"v18-context-graveyard",name:"Context Graveyard",desc:"Institutional knowledge loss angle. Every time someone quits, your company loses years of context. Go2 prevents that.",file:"v18-context-graveyard.html",size:"40 KB",built:true,type:"single",tags:["emotional"]},
  {num:19,slug:"v19-honest-page",name:"Honest Page",desc:"Radical transparency that acknowledges every counterargument. Disarms skeptics by saying what they're thinking first.",file:"v19-honest-page.html",size:"24 KB",built:true,type:"single",tags:["no-tracking"]},
  {num:20,slug:"v20-automation-factory",name:"Automation Factory",desc:"Automation discovery engine angle. Go2 finds the repetitive work your team does and automates it away.",file:"v20-automation-factory.html",size:"38 KB",built:true,type:"single",tags:["agent"]},
  {num:21,slug:"v21-scroll-narrative",name:"Scroll Narrative",desc:"Pitch-deck-style scroll-snap slides. Each screen is one powerful idea, creating a cinematic presentation feel.",file:"v21-scroll-narrative.html",size:"26 KB",built:true,type:"single",tags:["emotional"]},
  {num:22,slug:"v22-multipage",name:"Multipage",desc:"Clean multi-page site in the style of Stripe or Linear. Professional, polished, with dedicated pages for each story.",file:"v22-multipage/index.html",size:"17 KB",built:true,type:"multi",tags:["premium"]},
  {num:23,slug:"v23-aggressive-multipage",name:"Aggressive Multipage",desc:"Dark aggressive multi-page site. Combines the boldness of the single-page variants with multi-page depth.",file:"v23-aggressive-multipage/index.html",size:"21 KB",built:true,type:"multi",tags:["aggressive"]},
  {num:24,slug:"v24-emotional-journey",name:"Emotional Journey",desc:"An emotional arc that takes visitors from frustration through relief to action. Storytelling-driven conversion.",file:"v24-emotional-journey.html",size:"28 KB",built:true,type:"single",tags:["emotional"]},
  {num:25,slug:"v25-one-question",name:"One Question",desc:"Three-button funnel based on pain points. One question, three answers, three different tailored experiences.",file:"v25-one-question.html",size:"27 KB",built:true,type:"single",tags:["emotional"]},
  {num:26,slug:"v26-deep-agents-multipage",name:"Deep Agents Multipage",desc:"Multi-page site that goes deep on the AI agents angle with dedicated pages for each agent capability.",file:"v26-deep-agents-multipage/index.html",size:"20 KB",built:true,type:"multi",tags:["agent"]},
  {num:27,slug:"v27-hybrid-workforce",name:"Hybrid Workforce",desc:"Human+AI workforce OS. Positions Go2 as the operating system where human workers and AI agents collaborate.",file:"v27-hybrid-workforce.html",size:"46 KB",built:true,type:"single",tags:["agent","worker"]},
  {num:28,slug:"v28-storyboard",name:"Storyboard",desc:"Fictional company timeline narrative. Follows \"Acme Corp\" from chaos to clarity over 90 days with Go2.",file:"v28-storyboard.html",size:"33 KB",built:true,type:"single",tags:["emotional"]},
  {num:29,slug:"v29-consultant-killer",name:"Consultant Killer",desc:"Positioned against $150K consulting engagements. Why hire McKinsey when Go2 delivers the same insights continuously?",file:"v29-consultant-killer.html",size:"34 KB",built:true,type:"single",tags:["roi","aggressive"]},
  {num:30,slug:"v30-ai-for-everyone",name:"AI for Everyone",desc:"\"ChatGPT knows the internet, Go2 knows YOUR company.\" Makes AI personal and specific to each organization.",file:"v30-ai-for-everyone.html",size:"35 KB",built:true,type:"single",tags:["agent"]},
  {num:31,slug:"v31-company-brain",name:"Company Brain",desc:"Organizational intelligence and shared memory angle. Go2 becomes your company's collective brain that never forgets.",file:"v31-company-brain.html",size:"44 KB",built:true,type:"single",tags:["agent"]},
  {num:32,slug:"v32-operating-system",name:"Operating System",desc:"\"The OS for how companies actually run.\" Positions Go2 as infrastructure, not just another tool in the stack.",file:"v32-operating-system.html",size:"28 KB",built:true,type:"single",tags:["agent"]},
  {num:33,slug:"v33-workforce-multiplier",name:"Workforce Multiplier",desc:"\"30 people, 60 people's output.\" Pure force multiplication messaging for resource-constrained teams.",file:"v33-workforce-multiplier.html",size:"28 KB",built:true,type:"single",tags:["roi"]},
  {num:34,slug:"v34-hire-ai-workers",name:"Hire AI Workers",desc:"AI hiring platform angle. Browse, interview, and hire AI workers the same way you'd hire human employees.",file:"v34-hire-ai-workers.html",size:"48 KB",built:true,type:"single",tags:["agent"]},
  {num:35,slug:"v35-process-documentation",name:"Process Documentation",desc:"Auto-generated SOPs and compliance documentation. Go2 watches how work gets done and writes the manual.",file:"v35-process-documentation.html",size:"38 KB",built:true,type:"single",tags:["no-tracking"]},
  {num:36,slug:"v36-the-interview",name:"The Interview",desc:"Q&A format that addresses every objection directly. Reads like an honest interview with the product itself.",file:"v36-the-interview.html",size:"27 KB",built:true,type:"single",tags:["no-tracking"]},
  {num:37,slug:"v37-gets-smarter",name:"Gets Smarter",desc:"Compounding intelligence that builds value over time. Day 1 is good, day 90 is indispensable, day 365 is unfair advantage.",file:"v37-gets-smarter.html",size:"44 KB",built:true,type:"single",tags:["agent"]},
  {num:38,slug:"v38-ai-management",name:"AI Management",desc:"AI management layer for flat companies. Replace middle management overhead with intelligent AI coordination.",file:null,size:null,built:false,type:"single",tags:["agent"]},
  {num:39,slug:"v39-competitive-advantage",name:"Competitive Advantage",desc:"Business warfare and unfair advantage framing. Go2 is the weapon your competitors don't know about yet.",file:"v39-competitive-advantage.html",size:"38 KB",built:true,type:"single",tags:["aggressive","roi"]},
  {num:40,slug:"v40-invisible-mentor",name:"Invisible Mentor",desc:"Employee-first warm mentorship angle. Go2 is the senior colleague who's always available and never judges.",file:"v40-invisible-mentor.html",size:"37 KB",built:true,type:"single",tags:["worker","emotional"]},
  {num:41,slug:"v41-proof",name:"Proof",desc:"All evidence, zero marketing copy. Just data, screenshots, testimonials, and results. Let the proof do the talking.",file:"v41-proof.html",size:"32 KB",built:true,type:"single",tags:["roi"]},
  {num:42,slug:"v42-ai-implementation",name:"AI Implementation",desc:"\"How to actually use AI\" for confused SMBs. Positions Go2 as the bridge between AI hype and real business results.",file:null,size:null,built:false,type:"single",tags:["agent"]},
  {num:43,slug:"v43-premium-multipage",name:"Premium Multipage",desc:"Premium 4-page site with no time tracker comparisons. Pure value positioning without defining against competitors.",file:"v43-premium-multipage/index.html",size:"18 KB",built:true,type:"multi",tags:["premium","no-tracking"]},
  {num:44,slug:"v44-two-audiences",name:"Two Audiences",desc:"Split-screen manager vs worker perspectives. Both see the same product through completely different lenses.",file:null,size:null,built:false,type:"single",tags:["worker"]},
  {num:45,slug:"v45-payroll-audit",name:"Payroll Audit",desc:"Everything framed as payroll waste and recovery. Your payroll is your biggest expense. How much of it is wasted?",file:null,size:null,built:false,type:"single",tags:["roi"]},
  {num:46,slug:"v46-the-dare",name:"The Dare",desc:"Challenge format with money-back guarantee. Go2 dares you to try it for 30 days and not see ROI.",file:null,size:null,built:false,type:"single",tags:["aggressive"]},
  {num:47,slug:"v47-remote-work",name:"Remote Work",desc:"Saves remote work from RTO mandates. Gives managers the visibility they need without dragging everyone back to the office.",file:null,size:null,built:false,type:"single",tags:["worker","no-tracking"]},
  {num:48,slug:"v48-the-math",name:"The Math",desc:"Pure math and numbers with zero emotional appeal. For the CFO who only cares about the spreadsheet.",file:null,size:null,built:false,type:"single",tags:["roi"]},
  {num:49,slug:"v49-enterprise-multipage",name:"Enterprise Multipage",desc:"Up-market enterprise intelligence platform. Multi-page site targeting larger organizations with complex needs.",file:null,size:null,built:false,type:"multi",tags:["premium","agent"]}
];

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const filtersEl = document.getElementById('filters');
let activeFilter = 'all';

function formatNum(n) { return String(n).padStart(2,'0'); }

function renderCards(items) {
  grid.innerHTML = '';
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">No variations match your filter.</div>';
    return;
  }
  items.forEach(v => {
    const typeBadge = v.type === 'multi'
      ? '<span class="card-badge badge-multi">Multi-Page</span>'
      : '<span class="card-badge badge-single">Single Page</span>';
    const statusBadge = !v.built ? '<span class="card-badge badge-building">Building...</span>' : '';
    const sizeText = v.size ? v.size : '--';
    const linkHtml = v.built
      ? `<a href="${v.file}" class="card-link">Open Preview <span style="font-size:1.1em">&rarr;</span></a>`
      : `<span style="font-size:0.82rem;color:var(--amber)">Not yet built</span>`;
    const tagsHtml = v.tags.map(t => {
      const labels = {agent:'Agent',roi:'ROI','no-tracking':'No Tracking',premium:'Premium',aggressive:'Bold',worker:'Worker-First',emotional:'Story'};
      return `<span class="tag">${labels[t]||t}</span>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card' + (v.built ? '' : ' building');
    card.dataset.tags = v.tags.join(',');
    card.dataset.type = v.type;
    card.dataset.built = v.built;
    card.dataset.search = `v${formatNum(v.num)} ${v.name} ${v.desc} ${v.tags.join(' ')}`.toLowerCase();
    card.innerHTML = `
      <div class="card-top">
        <span class="card-num">V${formatNum(v.num)}</span>
        <div style="display:flex;gap:0.4rem">${statusBadge}${typeBadge}</div>
      </div>
      <h3>${v.name}</h3>
      <p>${v.desc}</p>
      <div class="card-footer">
        <div style="display:flex;flex-direction:column;gap:0.3rem">
          <div class="card-tags">${tagsHtml}</div>
          <span class="card-size">${sizeText}</span>
        </div>
        ${linkHtml}
      </div>
    `;
    if (v.built && v.file) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-link')) return;
        window.location.href = v.file;
      });
    }
    grid.appendChild(card);
  });
}

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = variations.filter(v => {
    const searchStr = `v${formatNum(v.num)} ${v.name} ${v.desc} ${v.tags.join(' ')}`.toLowerCase();
    if (query && !searchStr.includes(query)) return false;
    if (activeFilter === 'all') return true;
    if (activeFilter === 'single') return v.type === 'single';
    if (activeFilter === 'multi') return v.type === 'multi';
    return v.tags.includes(activeFilter);
  });
  renderCards(filtered);
}

// Filter buttons
filtersEl.addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-btn')) return;
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  applyFilters();
});

// Search
searchInput.addEventListener('input', applyFilters);

// Stats
const builtCount = variations.filter(v => v.built).length;
document.getElementById('built-count').textContent = builtCount;
document.getElementById('pending-count').textContent = variations.length - builtCount;

// Initial render
renderCards(variations);
</script>
</body>
</html>
