<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integration Marketplace | Go2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; }
.header { text-align: center; padding: 60px 20px 40px; }
.header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 12px; }
.header h1 span { background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #888; font-size: 1.05rem; max-width: 550px; margin: 0 auto 24px; }
.search-bar { max-width: 500px; margin: 0 auto; position: relative; }
.search-bar input { width: 100%; padding: 14px 20px 14px 44px; background: #1a1a2e; border: 1px solid #333; border-radius: 12px; color: #e0e0e0; font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
.search-bar input:focus { border-color: #6366f1; }
.search-bar::before { content: '&#128269;'; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1rem; }
.filters { display: flex; justify-content: center; gap: 8px; padding: 20px; flex-wrap: wrap; }
.filter-btn { padding: 8px 18px; border: 1px solid #333; background: transparent; color: #888; border-radius: 20px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.8rem; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
.app-card { background: rgba(255,255,255,0.02); border: 1px solid #1a1a2e; border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
.app-card:hover { border-color: #333; transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.app-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.app-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; flex-shrink: 0; }
.app-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
.app-info .app-category { font-size: 0.75rem; color: #666; }
.app-desc { font-size: 0.85rem; color: #888; line-height: 1.5; margin-bottom: 14px; }
.app-footer { display: flex; justify-content: space-between; align-items: center; }
.app-status { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
.app-status.popular { background: rgba(99,102,241,0.15); color: #818cf8; }
.app-status.new { background: rgba(34,197,94,0.15); color: #4ade80; }
.app-status.beta { background: rgba(245,158,11,0.15); color: #fbbf24; }
.install-btn { padding: 6px 16px; background: transparent; border: 1px solid #333; color: #ccc; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.install-btn:hover { background: #6366f1; border-color: #6366f1; color: #fff; }
.install-btn.installed { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: #4ade80; cursor: default; }
/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: #12121f; border: 1px solid #1a1a2e; border-radius: 20px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #666; font-size: 1.5rem; cursor: pointer; }
.modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.modal-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
.modal h2 { font-size: 1.4rem; font-weight: 700; }
.modal .modal-cat { color: #888; font-size: 0.85rem; }
.modal-body p { color: #999; line-height: 1.7; margin-bottom: 16px; font-size: 0.9rem; }
.modal-features { list-style: none; margin: 16px 0; }
.modal-features li { padding: 8px 0; color: #ccc; font-size: 0.85rem; display: flex; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.modal-features li::before { content: '&#10003;'; color: #22c55e; font-weight: 700; }
.modal-cta { display: flex; gap: 12px; margin-top: 24px; }
.modal-cta .cta-primary { padding: 12px 28px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.modal-cta .cta-secondary { padding: 12px 28px; background: transparent; border: 1px solid #333; color: #ccc; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; }
.cta-section { text-align: center; padding: 60px 20px; border-top: 1px solid #1a1a2e; }
.cta-section h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
.cta-section p { color: #888; margin-bottom: 20px; }
.main-cta { display: inline-block; padding: 14px 36px; background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 1rem; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>Integration <span>Marketplace</span></h1>
  <p>Connect Go2 with the tools your team already uses. One-click setup, instant productivity insights.</p>
  <div class="search-bar"><input type="text" placeholder="Search integrations..." id="searchInput" oninput="filterApps()"></div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="appGrid"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div><h2 id="modalTitle"></h2><div class="modal-cat" id="modalCat"></div></div>
    </div>
    <div class="modal-body">
      <p id="modalDesc"></p>
      <h4 style="font-size:0.85rem;margin-bottom:8px;">What you'll get:</h4>
      <ul class="modal-features" id="modalFeatures"></ul>
    </div>
    <div class="modal-cta">
      <button class="cta-primary" onclick="closeModal()">Install Integration</button>
      <button class="cta-secondary" onclick="closeModal()">View Docs</button>
    </div>
  </div>
</div>

<div class="cta-section">
  <h2>Don't see your tool?</h2>
  <p>We're adding new integrations every week. Request one or build your own with our API.</p>
  <button class="main-cta">Request Integration</button>
</div>

<script>
const apps = [
  { name: 'Slack', cat: 'Communication', icon: '#', color: '#4A154B', desc: 'Get productivity nudges and team summaries delivered directly to Slack channels.', status: 'popular', features: ['Daily team productivity summaries','Focus time reminders','Meeting overload alerts','Custom channel notifications'] },
  { name: 'Microsoft Teams', cat: 'Communication', icon: 'T', color: '#5B5FC7', desc: 'Integrate Go2 insights into your Teams workflow with bots and tab apps.', status: 'popular', features: ['Teams bot for quick insights','Tab app for dashboards','Meeting analytics','Activity status sync'] },
  { name: 'Jira', cat: 'Project Management', icon: 'J', color: '#0052CC', desc: 'Correlate Jira ticket velocity with productivity patterns and focus time.', status: 'popular', features: ['Sprint velocity insights','Ticket-to-focus time correlation','Blocker detection','Capacity planning data'] },
  { name: 'Asana', cat: 'Project Management', icon: 'A', color: '#F06A6A', desc: 'See how task completion aligns with productive hours and team capacity.', status: 'new', features: ['Task completion analytics','Workload balancing insights','Project timeline predictions','Team capacity heatmaps'] },
  { name: 'GitHub', cat: 'Development', icon: 'G', color: '#333', desc: 'Connect code commits, PRs, and reviews with developer productivity data.', status: 'popular', features: ['Commit pattern analysis','PR review time tracking','Code review load balancing','Developer flow state detection'] },
  { name: 'GitLab', cat: 'Development', icon: 'GL', color: '#FC6D26', desc: 'Full GitLab pipeline integration for engineering team insights.', status: 'new', features: ['CI/CD pipeline correlation','Merge request analytics','Issue-to-code tracking','DevOps metrics integration'] },
  { name: 'Google Calendar', cat: 'Calendar', icon: 'GC', color: '#4285F4', desc: 'Analyze meeting patterns and protect focus time across your organization.', status: 'popular', features: ['Meeting load analysis','Focus time protection','Schedule optimization suggestions','Cross-team meeting insights'] },
  { name: 'Outlook', cat: 'Calendar', icon: 'O', color: '#0078D4', desc: 'Sync Outlook calendar data for comprehensive meeting and focus analysis.', status: 'popular', features: ['Calendar analytics','Meeting cost calculator','Free time identification','Recurring meeting audit'] },
  { name: 'Notion', cat: 'Knowledge', icon: 'N', color: '#fff', desc: 'Push Go2 reports and insights directly into your Notion workspace.', status: 'new', features: ['Auto-generated reports in Notion','Team dashboard pages','Knowledge base integration','Custom report templates'] },
  { name: 'Figma', cat: 'Design', icon: 'F', color: '#A259FF', desc: 'Track design workflow patterns and optimize creative team productivity.', status: 'beta', features: ['Design session tracking','Creative flow analysis','Collaboration patterns','Review cycle optimization'] },
  { name: 'Linear', cat: 'Project Management', icon: 'L', color: '#5E6AD2', desc: 'Connect Linear issues with engineering productivity for smarter planning.', status: 'new', features: ['Issue velocity tracking','Cycle time optimization','Team workload insights','Priority alignment analysis'] },
  { name: 'Zoom', cat: 'Communication', icon: 'Z', color: '#2D8CFF', desc: 'Analyze meeting frequency, duration, and their impact on deep work time.', status: 'popular', features: ['Meeting frequency analysis','Duration trend tracking','No-meeting day enforcement','Meeting-free block protection'] },
  { name: 'Salesforce', cat: 'CRM', icon: 'SF', color: '#00A1E0', desc: 'Connect sales activity with productivity data for revenue team optimization.', status: 'beta', features: ['Sales activity correlation','Pipeline velocity insights','Rep productivity scoring','Territory balancing'] },
  { name: 'HubSpot', cat: 'CRM', icon: 'H', color: '#FF7A59', desc: 'Align marketing and sales productivity with pipeline and conversion data.', status: 'new', features: ['Campaign-to-output correlation','Content productivity tracking','Lead response optimization','Team performance dashboards'] },
  { name: 'Trello', cat: 'Project Management', icon: 'Tr', color: '#0079BF', desc: 'Visualize Trello board activity alongside team productivity patterns.', status: 'popular', features: ['Board activity analysis','Card velocity tracking','Bottleneck identification','Workload distribution'] },
  { name: 'Confluence', cat: 'Knowledge', icon: 'C', color: '#1868DB', desc: 'Track documentation productivity and knowledge sharing patterns.', status: 'beta', features: ['Documentation velocity','Knowledge sharing metrics','Page engagement tracking','Content gap analysis'] },
];

const categories = ['All', ...new Set(apps.map(a => a.cat))];
let activeFilter = 'All';

document.getElementById('filters').innerHTML = categories.map(c => `<button class="filter-btn ${c === 'All' ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('');

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  filterApps();
}

function filterApps() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = apps.filter(a => {
    const matchCat = activeFilter === 'All' || a.cat === activeFilter;
    const matchSearch = !search || a.name.toLowerCase().includes(search) || a.cat.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  renderGrid(filtered);
}

function renderGrid(list) {
  document.getElementById('appGrid').innerHTML = list.map((a, i) => `
    <div class="app-card" onclick="openModal(${apps.indexOf(a)})">
      <div class="app-card-top">
        <div class="app-icon" style="background:${a.color};color:#fff;${a.color==='#fff'?'color:#000;border:1px solid #333;':''}">${a.icon}</div>
        <div class="app-info"><h3>${a.name}</h3><div class="app-category">${a.cat}</div></div>
      </div>
      <div class="app-desc">${a.desc}</div>
      <div class="app-footer">
        <span class="app-status ${a.status}">${a.status === 'popular' ? 'Popular' : a.status === 'new' ? 'New' : 'Beta'}</span>
        <button class="install-btn" onclick="event.stopPropagation();this.classList.add('installed');this.textContent='Installed'">Install</button>
      </div>
    </div>
  `).join('');
}

function openModal(idx) {
  const a = apps[idx];
  document.getElementById('modalIcon').style.background = a.color;
  document.getElementById('modalIcon').style.color = a.color === '#fff' ? '#000' : '#fff';
  document.getElementById('modalIcon').textContent = a.icon;
  document.getElementById('modalTitle').textContent = a.name;
  document.getElementById('modalCat').textContent = a.cat;
  document.getElementById('modalDesc').textContent = a.desc;
  document.getElementById('modalFeatures').innerHTML = a.features.map(f => `<li>${f}</li>`).join('');
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

filterApps();
</script>
</body>
</html>
