<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Insights | Go2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.header { text-align: center; padding: 60px 20px 30px; }
.header h1 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; margin-bottom: 10px; }
.header h1 span { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #888; max-width: 550px; margin: 0 auto; }
.tabs { display: flex; justify-content: center; gap: 4px; padding: 0 20px; margin-bottom: 30px; flex-wrap: wrap; max-width: 800px; margin-left: auto; margin-right: auto; }
.tab { padding: 10px 20px; background: transparent; border: 1px solid #1a1a2e; color: #888; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.tab:hover { border-color: #333; color: #ccc; }
.tab.active { background: #6366f1; border-color: #6366f1; color: #fff; }
.tab-icon { font-size: 1rem; }
.dashboard { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: none; }
.dashboard.active { display: block; }
.dash-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
.dash-title { font-size: 1.4rem; font-weight: 700; }
.dash-subtitle { color: #888; font-size: 0.9rem; margin-top: 4px; }
.dash-score { text-align: right; }
.dash-score .score-num { font-size: 2.5rem; font-weight: 900; }
.dash-score .score-label { font-size: 0.75rem; color: #666; }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.metric-card { background: rgba(255,255,255,0.02); border: 1px solid #1a1a2e; border-radius: 12px; padding: 18px; }
.metric-card .metric-val { font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
.metric-card .metric-label { font-size: 0.75rem; color: #666; }
.metric-card .metric-change { font-size: 0.75rem; font-weight: 600; margin-top: 4px; }
.metric-card .metric-change.up { color: #4ade80; }
.metric-card .metric-change.down { color: #f87171; }
.chart-panel { background: rgba(255,255,255,0.02); border: 1px solid #1a1a2e; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.chart-panel h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; }
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { min-width: 100px; font-size: 0.8rem; color: #888; text-align: right; }
.bar-track { flex: 1; height: 24px; background: #1a1a2e; border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.8); transition: width 0.8s ease; }
.bar-value { min-width: 40px; text-align: right; font-size: 0.8rem; font-weight: 600; }
.insights-list { list-style: none; }
.insights-list li { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; gap: 10px; font-size: 0.85rem; color: #ccc; line-height: 1.5; }
.insight-icon { flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
.insight-icon.tip { background: rgba(99,102,241,0.15); color: #818cf8; }
.insight-icon.alert { background: rgba(245,158,11,0.15); color: #fbbf24; }
.insight-icon.win { background: rgba(34,197,94,0.15); color: #4ade80; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cta-section { text-align: center; padding: 60px 20px; }
.cta-section h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
.cta-section p { color: #888; margin-bottom: 20px; }
.cta-btn { display: inline-block; padding: 14px 36px; background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 1rem; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .tabs { gap: 6px; } .tab { padding: 8px 14px; font-size: 0.8rem; } }
</style>
</head>
<body>
<div class="header">
  <h1>How Each Department Uses <span>Go2</span></h1>
  <p>Every department has different productivity patterns. Go2 adapts its coaching to each team's unique workflow.</p>
</div>

<div class="tabs" id="tabs"></div>
<div id="dashboards"></div>

<div class="cta-section">
  <h2>See your department's real data</h2>
  <p>These are simulated dashboards. Start a free trial to see your team's actual productivity patterns.</p>
  <button class="cta-btn">Start Free Trial</button>
</div>

<script>
const departments = [
  {
    name: 'Engineering', icon: '&#128187;', color: '#6366f1', score: 85, scoreColor: '#818cf8',
    metrics: [
      { val: '22.5h', label: 'Avg Focus Time/Week', change: '+18%', dir: 'up' },
      { val: '6.2h', label: 'Meeting Time/Week', change: '-32%', dir: 'up' },
      { val: '3.4', label: 'Context Switches/Hour', change: '-15%', dir: 'up' },
      { val: '94%', label: 'Sprint Completion', change: '+8%', dir: 'up' },
    ],
    bars: [
      { label: 'Deep Work', pct: 56, color: '#6366f1' },
      { label: 'Code Review', pct: 18, color: '#818cf8' },
      { label: 'Meetings', pct: 15, color: '#a855f7' },
      { label: 'Communication', pct: 8, color: '#c084fc' },
      { label: 'Admin', pct: 3, color: '#e9d5ff' },
    ],
    insights: [
      { type: 'win', text: 'Engineering team has the highest focus time ratio across all departments.' },
      { type: 'tip', text: 'Tuesday afternoons show peak code output. Consider protecting this block from meetings.' },
      { type: 'alert', text: 'Code review bottleneck detected — 3 engineers handle 70% of reviews.' },
      { type: 'tip', text: 'Post-standup 30 min shows highest context-switch rate. Consider async standups.' },
    ],
  },
  {
    name: 'Design', icon: '&#127912;', color: '#ec4899', score: 79, scoreColor: '#f472b6',
    metrics: [
      { val: '18.8h', label: 'Creative Focus/Week', change: '+22%', dir: 'up' },
      { val: '9.1h', label: 'Meeting Time/Week', change: '-18%', dir: 'up' },
      { val: '2.1', label: 'Review Cycles/Project', change: '-25%', dir: 'up' },
      { val: '4.2d', label: 'Avg Design Turnaround', change: '-30%', dir: 'up' },
    ],
    bars: [
      { label: 'Design Work', pct: 47, color: '#ec4899' },
      { label: 'Review/Feedback', pct: 20, color: '#f472b6' },
      { label: 'Meetings', pct: 22, color: '#f9a8d4' },
      { label: 'Research', pct: 8, color: '#fbcfe8' },
      { label: 'Admin', pct: 3, color: '#fce7f3' },
    ],
    insights: [
      { type: 'win', text: 'Design review cycles reduced from 2.8 to 2.1 after implementing Go2 suggestions.' },
      { type: 'alert', text: 'Design team spends 22% of time in meetings — highest percentage after Sales.' },
      { type: 'tip', text: 'Morning blocks (9-11 AM) show 40% more creative output. Protect these hours.' },
      { type: 'tip', text: 'Figma session data shows optimal design sprints are 90 minutes with 15-min breaks.' },
    ],
  },
  {
    name: 'Sales', icon: '&#128200;', color: '#22c55e', score: 72, scoreColor: '#4ade80',
    metrics: [
      { val: '34', label: 'Calls/Week/Rep', change: '+15%', dir: 'up' },
      { val: '12.5h', label: 'Meeting Time/Week', change: '-8%', dir: 'up' },
      { val: '23%', label: 'Close Rate', change: '+5%', dir: 'up' },
      { val: '18min', label: 'Avg Response Time', change: '-42%', dir: 'up' },
    ],
    bars: [
      { label: 'Calls/Demos', pct: 35, color: '#22c55e' },
      { label: 'Meetings', pct: 31, color: '#4ade80' },
      { label: 'CRM/Admin', pct: 18, color: '#86efac' },
      { label: 'Prospecting', pct: 12, color: '#bbf7d0' },
      { label: 'Training', pct: 4, color: '#dcfce7' },
    ],
    insights: [
      { type: 'win', text: 'Lead response time dropped from 31min to 18min — directly correlating with 5% close rate increase.' },
      { type: 'alert', text: 'Reps spend 18% of time on CRM data entry. Automation could recover 7+ hours/week.' },
      { type: 'tip', text: 'Top performers prospect between 8-9 AM. Consider shifting team prospecting blocks earlier.' },
      { type: 'tip', text: 'Thursday demos convert 23% higher than Monday demos. Optimize scheduling.' },
    ],
  },
  {
    name: 'Marketing', icon: '&#128226;', color: '#f59e0b', score: 76, scoreColor: '#fbbf24',
    metrics: [
      { val: '16.3h', label: 'Content Creation/Week', change: '+28%', dir: 'up' },
      { val: '8.7h', label: 'Meeting Time/Week', change: '-20%', dir: 'up' },
      { val: '3.2x', label: 'Content Output', change: '+45%', dir: 'up' },
      { val: '82%', label: 'Campaign On-Time Rate', change: '+12%', dir: 'up' },
    ],
    bars: [
      { label: 'Content Creation', pct: 40, color: '#f59e0b' },
      { label: 'Meetings', pct: 22, color: '#fbbf24' },
      { label: 'Analytics', pct: 15, color: '#fcd34d' },
      { label: 'Communication', pct: 13, color: '#fde68a' },
      { label: 'Planning', pct: 10, color: '#fef3c7' },
    ],
    insights: [
      { type: 'win', text: 'Content output tripled after Go2 identified and eliminated 3 redundant approval steps.' },
      { type: 'tip', text: 'Blog post quality peaks during 2-4 PM focus blocks. Social content best created 9-11 AM.' },
      { type: 'alert', text: 'Cross-department meeting load spiked 40% this quarter. Consider async updates.' },
      { type: 'tip', text: 'Marketing-Sales alignment meetings could be bi-weekly instead of weekly — data shows no impact.' },
    ],
  },
  {
    name: 'Operations', icon: '&#9881;', color: '#3b82f6', score: 81, scoreColor: '#60a5fa',
    metrics: [
      { val: '94.2%', label: 'Process Compliance', change: '+6%', dir: 'up' },
      { val: '7.3h', label: 'Meeting Time/Week', change: '-25%', dir: 'up' },
      { val: '2.1d', label: 'Avg Issue Resolution', change: '-35%', dir: 'up' },
      { val: '99.8%', label: 'SLA Compliance', change: '+1.2%', dir: 'up' },
    ],
    bars: [
      { label: 'Process Work', pct: 42, color: '#3b82f6' },
      { label: 'Coordination', pct: 22, color: '#60a5fa' },
      { label: 'Meetings', pct: 18, color: '#93c5fd' },
      { label: 'Reporting', pct: 12, color: '#bfdbfe' },
      { label: 'Training', pct: 6, color: '#dbeafe' },
    ],
    insights: [
      { type: 'win', text: 'Issue resolution time dropped 35% after Go2 identified handoff delays between shifts.' },
      { type: 'tip', text: 'Automate weekly status reports — team spends 3.5 hours/week on manual reporting.' },
      { type: 'alert', text: 'Monday morning ramp-up takes 45 minutes longer than other days. Pre-shift briefings could help.' },
      { type: 'tip', text: 'Cross-training sessions during low-volume periods would improve coverage flexibility.' },
    ],
  },
];

const tabsEl = document.getElementById('tabs');
const dashEl = document.getElementById('dashboards');

departments.forEach((dept, i) => {
  tabsEl.innerHTML += `<button class="tab ${i===0?'active':''}" onclick="showDept(${i})"><span class="tab-icon">${dept.icon}</span>${dept.name}</button>`;

  const barsHTML = dept.bars.map(b => `<div class="bar-row"><span class="bar-label">${b.label}</span><div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.color}">${b.pct}%</div></div></div>`).join('');
  const metricsHTML = dept.metrics.map(m => `<div class="metric-card"><div class="metric-val" style="color:${dept.scoreColor}">${m.val}</div><div class="metric-label">${m.label}</div><div class="metric-change ${m.dir === 'up' ? 'up' : 'down'}">${m.change} vs last quarter</div></div>`).join('');
  const insightsHTML = dept.insights.map(ins => `<li><span class="insight-icon ${ins.type}">${ins.type==='win'?'&#10003;':ins.type==='tip'?'&#9733;':'!'}</span>${ins.text}</li>`).join('');

  dashEl.innerHTML += `
    <div class="dashboard ${i===0?'active':''}" id="dept${i}">
      <div class="dash-header">
        <div><div class="dash-title">${dept.icon} ${dept.name} Department</div><div class="dash-subtitle">Productivity dashboard powered by Go2 AI coaching</div></div>
        <div class="dash-score"><div class="score-num" style="color:${dept.scoreColor}">${dept.score}</div><div class="score-label">Productivity Score</div></div>
      </div>
      <div class="metric-grid">${metricsHTML}</div>
      <div class="two-col">
        <div class="chart-panel"><h4>Time Distribution</h4><div class="bar-chart">${barsHTML}</div></div>
        <div class="chart-panel"><h4>AI Insights</h4><ul class="insights-list">${insightsHTML}</ul></div>
      </div>
    </div>
  `;
});

function showDept(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.dashboard').forEach((d, i) => d.classList.toggle('active', i === idx));
}
</script>
</body>
</html>
