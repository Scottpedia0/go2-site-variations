<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 Desktop Experience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body { font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; }

  /* Desktop wallpaper */
  #desktop {
    width: 100vw; height: 100vh; position: relative;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    overflow: hidden;
  }

  /* Wallpaper pattern */
  #desktop::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 80%, rgba(120,80,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(80,200,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,120,80,0.05) 0%, transparent 60%);
  }

  /* Desktop icons */
  .desktop-icon {
    position: absolute; width: 80px; text-align: center; cursor: pointer; padding: 6px;
    border-radius: 8px; transition: background 0.15s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.1); }
  .desktop-icon:active { background: rgba(255,255,255,0.2); }
  .desktop-icon .icon { width: 52px; height: 52px; margin: 0 auto 4px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .desktop-icon .label { color: white; font-size: 11px; font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8); line-height: 1.2; }

  /* Menubar */
  #menubar {
    position: fixed; top: 0; left: 0; right: 0; height: 28px; z-index: 9999;
    background: rgba(30,30,30,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; padding: 0 12px; color: white; font-size: 13px; font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #menubar .apple { font-size: 16px; margin-right: 16px; cursor: pointer; }
  #menubar .app-name { font-weight: 600; margin-right: 20px; }
  #menubar .menu-item { margin-right: 16px; cursor: pointer; opacity: 0.85; }
  #menubar .menu-item:hover { opacity: 1; }
  #menubar .right { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12px; }
  .menubar-badge { background: #ff3b30; color: white; border-radius: 50%; width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700;
    position: relative; top: -1px; }

  /* Dock */
  #dock {
    position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%); z-index: 9998;
    background: rgba(30,30,30,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 18px; padding: 4px 8px; display: flex; gap: 4px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .dock-icon {
    width: 52px; height: 52px; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    transition: transform 0.2s; position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .dock-icon:hover { transform: scale(1.3) translateY(-10px); }
  .dock-icon .dock-dot {
    position: absolute; bottom: -4px; width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,0.7);
  }
  .dock-separator { width: 1px; background: rgba(255,255,255,0.2); margin: 8px 4px; }

  /* Windows */
  .window {
    position: absolute; min-width: 400px; min-height: 250px; border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
    overflow: hidden; display: flex; flex-direction: column; z-index: 100;
    animation: windowOpen 0.25s ease-out;
  }
  @keyframes windowOpen { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .window.minimized { display: none; }

  .window .titlebar {
    height: 38px; background: rgba(50,50,50,0.95); backdrop-filter: blur(10px);
    display: flex; align-items: center; padding: 0 12px; cursor: grab; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .window .titlebar:active { cursor: grabbing; }
  .window .titlebar .buttons { display: flex; gap: 7px; margin-right: 12px; }
  .window .titlebar .btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
  .window .titlebar .btn-close { background: #ff5f57; }
  .window .titlebar .btn-close:hover { background: #ff3b30; }
  .window .titlebar .btn-minimize { background: #ffbd2e; }
  .window .titlebar .btn-maximize { background: #28c940; }
  .window .titlebar .title { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; flex: 1; text-align: center; }
  .window .content { flex: 1; background: #1e1e1e; color: #e0e0e0; overflow-y: auto; font-size: 13px; }

  /* Notification toast */
  .notification {
    position: fixed; top: 36px; right: 12px; width: 340px; z-index: 10000;
    background: rgba(40,40,40,0.95); backdrop-filter: blur(20px);
    border-radius: 14px; padding: 14px 16px; color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    animation: slideIn 0.3s ease-out; cursor: pointer;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .notification .notif-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .notification .notif-icon { width: 20px; height: 20px; border-radius: 5px; background: linear-gradient(135deg, #7c3aed, #2563eb);
    display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .notification .notif-app { font-size: 12px; font-weight: 600; flex: 1; }
  .notification .notif-time { font-size: 11px; color: rgba(255,255,255,0.5); }
  .notification .notif-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .notification .notif-body { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.4; }

  /* Specific window content styles */
  .dashboard-content { padding: 20px; }
  .dashboard-content h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); }
  .stat-card .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 700; }
  .stat-card .stat-change { font-size: 11px; margin-top: 4px; }
  .stat-card .stat-change.up { color: #34d399; }
  .stat-card .stat-change.down { color: #f87171; }

  .workflow-list { list-style: none; }
  .workflow-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 12px; }
  .workflow-item:hover { background: rgba(255,255,255,0.03); }
  .workflow-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .workflow-status.active { background: #34d399; }
  .workflow-status.learning { background: #fbbf24; }
  .workflow-status.idle { background: #6b7280; }
  .workflow-name { flex: 1; font-weight: 500; }
  .workflow-meta { font-size: 11px; color: rgba(255,255,255,0.4); }

  .coaching-content { padding: 0; }
  .coaching-msg { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .coaching-msg:hover { background: rgba(255,255,255,0.03); }
  .coaching-msg .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .coaching-msg .msg-title { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
  .coaching-msg .msg-body { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }
  .coaching-msg .msg-action { display: inline-block; margin-top: 8px; background: #7c3aed; color: white;
    padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .coaching-msg .msg-action:hover { background: #6d28d9; }

  .agent-content { padding: 16px; }
  .agent-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px; }
  .agent-card .agent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .agent-card .agent-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-size: 18px; }
  .agent-card .agent-name { font-weight: 600; }
  .agent-card .agent-status-text { font-size: 11px; }
  .agent-card .agent-status-text.running { color: #34d399; }
  .agent-card .agent-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 11px; }
  .agent-card .agent-stat { text-align: center; }
  .agent-card .agent-stat-val { font-size: 18px; font-weight: 600; }
  .agent-card .agent-stat-label { color: rgba(255,255,255,0.4); }
  .agent-card .agent-log { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 10px;
    background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; font-family: 'SF Mono', monospace; line-height: 1.6; }

  .process-content { padding: 20px; }
  .process-map { position: relative; padding: 20px 0; }
  .process-node { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px;
    background: rgba(255,255,255,0.08); border-radius: 8px; margin: 6px; border: 1px solid rgba(255,255,255,0.12); }
  .process-node.automated { border-color: #34d399; background: rgba(52,211,153,0.1); }
  .process-node.coaching { border-color: #fbbf24; background: rgba(251,191,36,0.1); }
  .process-arrow { display: inline-block; color: rgba(255,255,255,0.3); margin: 0 4px; }
  .process-legend { display: flex; gap: 16px; margin-top: 16px; font-size: 11px; }
  .process-legend span { display: flex; align-items: center; gap: 6px; }
  .process-legend .dot { width: 10px; height: 10px; border-radius: 3px; }

  .about-content { padding: 24px; }
  .about-content h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .about-content .tagline { font-size: 15px; color: #a78bfa; margin-bottom: 20px; }
  .about-content p { margin-bottom: 14px; color: rgba(255,255,255,0.75); line-height: 1.7; font-size: 13px; }
  .about-content .phases { margin: 20px 0; }
  .about-content .phase { display: flex; gap: 12px; margin-bottom: 14px; }
  .about-content .phase-num { width: 28px; height: 28px; border-radius: 50%; background: #7c3aed;
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .about-content .phase-text h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .about-content .phase-text p { margin-bottom: 0; font-size: 12px; }
  .about-cta { display: inline-block; background: linear-gradient(135deg, #7c3aed, #2563eb); color: white;
    padding: 10px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 10px; text-decoration: none; }
  .about-cta:hover { opacity: 0.9; }

  /* System tray Go2 icon pulse */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .tray-go2 { animation: pulse 3s infinite; }
</style>
</head>

function openWindow(id) {
  if (windows[id] && !windows[id].classList.contains('minimized')) {
    // Bring to front
    windows[id].style.zIndex = ++windowZ;
    return;
  }
  if (windows[id]) {
    windows[id].classList.remove('minimized');
    windows[id].style.zIndex = ++windowZ;
    return;
  }

  const def = WINDOW_DEFS[id];
  const win = document.createElement('div');
  win.className = 'window';
  win.style.width = def.width + 'px';
  win.style.height = def.height + 'px';
  win.style.left = def.x + 'px';
  win.style.top = def.y + 'px';
  win.style.zIndex = ++windowZ;
  win.dataset.id = id;

  win.innerHTML = `
    <div class="titlebar">
      <div class="buttons">
        <div class="btn btn-close"></div>
        <div class="btn btn-minimize"></div>
        <div class="btn btn-maximize"></div>
      </div>
      <div class="title">${def.title}</div>
    </div>
    <div class="content">${def.content}</div>
  `;

  document.getElementById('desktop').appendChild(win);
  windows[id] = win;

  // Close button
  win.querySelector('.btn-close').addEventListener('click', (e) => {
    e.stopPropagation();
    win.remove();
    delete windows[id];
  });

  // Minimize
  win.querySelector('.btn-minimize').addEventListener('click', (e) => {
    e.stopPropagation();
    win.classList.add('minimized');
  });

  // Maximize
  win.querySelector('.btn-maximize').addEventListener('click', (e) => {
    e.stopPropagation();
    if (win.dataset.maximized === 'true') {
      win.style.width = def.width + 'px';
      win.style.height = def.height + 'px';
      win.style.left = def.x + 'px';
      win.style.top = def.y + 'px';
      win.dataset.maximized = 'false';
    } else {
      win.style.width = '100vw';
      win.style.height = 'calc(100vh - 28px)';
      win.style.left = '0';
      win.style.top = '28px';
      win.dataset.maximized = 'true';
    }
  });

  // Focus on click
  win.addEventListener('mousedown', () => { win.style.zIndex = ++windowZ; });

  // Drag
  const titlebar = win.querySelector('.titlebar');
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('btn')) return;
    win.style.zIndex = ++windowZ;
    dragState = {
      win,
      startX: e.clientX - win.offsetLeft,
      startY: e.clientY - win.offsetTop
    };
  });

  // Resize handle (bottom-right corner)
  win.addEventListener('mousedown', (e) => {
    const rect = win.getBoundingClientRect();
    if (e.clientX > rect.right - 12 && e.clientY > rect.bottom - 12) {
      dragState = {
        win,
        resize: true,
        startX: e.clientX,
        startY: e.clientY,
        startW: rect.width,
        startH: rect.height
      };
      e.preventDefault();
    }
  });
}

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  if (dragState.resize) {
    const newW = Math.max(300, dragState.startW + (e.clientX - dragState.startX));
    const newH = Math.max(200, dragState.startH + (e.clientY - dragState.startY));
    dragState.win.style.width = newW + 'px';
    dragState.win.style.height = newH + 'px';
  } else {
    dragState.win.style.left = (e.clientX - dragState.startX) + 'px';
    dragState.win.style.top = (e.clientY - dragState.startY) + 'px';
  }
});
document.addEventListener('mouseup', () => { dragState = null; });

}
