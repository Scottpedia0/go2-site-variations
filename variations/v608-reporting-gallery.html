<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 Report Gallery — See Every Report Type | Go2.io</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; color: #1a1a2e; background: #f9fafb; line-height: 1.6; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(249,250,251,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid #e5e7eb; padding: 14px 0; }
nav .container { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 22px; font-weight: 800; color: #7c3aed; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-links a { color: #666; text-decoration: none; font-size: 13px; font-weight: 500; }
.nav-cta { background: #7c3aed !important; color: #fff !important; padding: 8px 20px !important; border-radius: 8px !important; }

.hero { padding: 120px 0 40px; text-align: center; }
.hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 12px; }
.hero p { font-size: 17px; color: #666; max-width: 560px; margin: 0 auto 24px; }

.filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
.filter-btn { padding: 8px 18px; background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; color: #666; }
.filter-btn.active { border-color: #7c3aed; color: #7c3aed; background: #f5f3ff; }

.gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding-bottom: 60px; }
.report-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
.report-card:hover { border-color: #c4b5fd; box-shadow: 0 8px 32px rgba(124,58,237,0.08); transform: translateY(-4px); }
.report-thumb { height: 200px; background: #f5f3ff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.report-thumb .mock { width: 85%; height: 85%; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 12px; }
.mock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.mock-title { font-size: 9px; font-weight: 700; color: #333; }
.mock-badge { font-size: 7px; background: #f5f3ff; color: #7c3aed; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
.mock-bars { display: flex; gap: 3px; align-items: flex-end; height: 40px; }
.mock-bar { flex: 1; background: #c4b5fd; border-radius: 2px 2px 0 0; }
.mock-lines { margin-top: 8px; }
.mock-line { height: 4px; background: #f0f0f0; border-radius: 2px; margin-bottom: 4px; }
.mock-line.short { width: 60%; }
.mock-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 8px; }
.mock-metric { background: #f9fafb; border-radius: 4px; padding: 4px; text-align: center; }
.mock-metric .num { font-size: 10px; font-weight: 800; color: #7c3aed; }
.mock-metric .lbl { font-size: 6px; color: #999; }
.mock-pie { width: 50px; height: 50px; border-radius: 50%; background: conic-gradient(#7c3aed 0% 35%, #a78bfa 35% 60%, #c4b5fd 60% 80%, #e9e5ff 80% 100%); margin: 8px auto; }
.mock-table { margin-top: 6px; }
.mock-row { display: flex; gap: 4px; margin-bottom: 3px; }
.mock-cell { flex: 1; height: 6px; background: #f0f0f0; border-radius: 2px; }
.mock-cell.head { background: #e9e5ff; }

.report-info { padding: 16px 20px; }
.report-type { font-size: 11px; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.report-name { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.report-desc { font-size: 13px; color: #888; }
.report-tags { display: flex; gap: 6px; margin-top: 8px; }
.tag { font-size: 11px; background: #f5f3ff; color: #7c3aed; padding: 2px 8px; border-radius: 4px; font-weight: 500; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
.modal h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.modal .type { font-size: 12px; color: #7c3aed; font-weight: 700; margin-bottom: 16px; }
.modal p { color: #555; margin-bottom: 12px; }
.modal-features { list-style: none; margin: 16px 0; }
.modal-features li { padding: 8px 0; display: flex; gap: 8px; font-size: 14px; color: #555; border-bottom: 1px solid #f5f5f5; }
.modal-features li::before { content: '\2713'; color: #7c3aed; font-weight: 700; }
.modal-cta { display: inline-block; background: #7c3aed; color: #fff; padding: 12px 28px; border-radius: 8px; font-weight: 600; text-decoration: none; margin-top: 16px; }

footer { padding: 32px 0; text-align: center; color: #999; font-size: 13px; border-top: 1px solid #e5e7eb; background: #fff; }

@media (max-width: 768px) {
  .gallery { grid-template-columns: 1fr; }
  .hero h1 { font-size: 30px; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav>
  <div class="container">
    <div class="logo">Go2 Reports</div>
    <div class="nav-links">
      <a href="#executive">Executive</a>
      <a href="#team">Team</a>
      <a href="#individual">Individual</a>
      <a href="#" class="nav-cta">Try Go2 Free</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <h1>Report Gallery</h1>
    <p>Explore every report Go2 generates. Click any report for a detailed preview and feature breakdown.</p>
  </div>
</section>

<div class="container">
  <div class="filter-bar">
    <div class="filter-btn active" data-filter="all">All Reports</div>
    <div class="filter-btn" data-filter="executive">Executive</div>
    <div class="filter-btn" data-filter="team">Team</div>
    <div class="filter-btn" data-filter="individual">Individual</div>
    <div class="filter-btn" data-filter="compliance">Compliance</div>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer><div class="container">&copy; 2026 Go2.io &mdash; All reports available on Business and Enterprise plans</div></footer>

<script>
const reports = [
  { type:'executive', name:'Executive Summary', desc:'High-level org productivity overview for C-suite.', tags:['Weekly','PDF'], bars:[80,60,90,70,85,55], features:['Organization-wide productivity score','Week-over-week trending','Top insights and recommendations','Department comparison','Key metrics: hours saved, productivity index, ROI'] },
  { type:'executive', name:'ROI Dashboard', desc:'Real-time return on investment tracking.', tags:['Real-time','Interactive'], bars:[40,65,80,90,95,100], features:['Monthly cost vs. savings','Cumulative ROI over time','Per-department ROI breakdown','Payback period tracking','Projected annual savings'] },
  { type:'executive', name:'Department Comparison', desc:'Side-by-side department performance benchmarks.', tags:['Monthly','Compare'], bars:[70,85,60,75,90,80], features:['Productivity scores by department','Utilization rates','Meeting time distribution','Deep work hours comparison','Improvement recommendations'] },
  { type:'team', name:'Team Productivity', desc:'Detailed team-level analytics for managers.', tags:['Weekly','Team'], bars:[65,80,70,85,60,75], features:['Team productivity score and trend','Individual contribution heatmap','Focus time vs. meeting time','Collaboration patterns','AI coaching recommendations for the team'] },
  { type:'team', name:'Meeting Analysis', desc:'Time spent in meetings and their effectiveness.', tags:['Weekly','Meetings'], bars:[90,80,70,60,50,40], features:['Total meeting hours per team','Meeting frequency and duration trends','Recurring vs. ad-hoc breakdown','Meeting-free time analysis','Recommendations for meeting optimization'] },
  { type:'team', name:'Collaboration Map', desc:'Who works with whom, how often, and on what.', tags:['Interactive','Visual'], bars:[50,70,90,60,80,45], features:['Cross-team collaboration visualization','Communication channel analysis','Project-based team dynamics','Siloed team identification','Collaboration health score'] },
  { type:'individual', name:'Personal Dashboard', desc:'Individual productivity coaching report.', tags:['Daily','Personal'], bars:[75,85,90,70,80,95], features:['Personal productivity score','Daily focus time tracking','Top productive hours identification','App usage breakdown','AI coaching tips (positive, actionable)'] },
  { type:'individual', name:'Focus Time Report', desc:'Deep work tracking and interruption analysis.', tags:['Weekly','Focus'], bars:[90,20,80,30,85,25], features:['Daily deep work hours','Interruption frequency and source','Best focus time windows','Week-over-week improvement','Personalized focus strategies'] },
  { type:'individual', name:'Work-Life Balance', desc:'Healthy work pattern monitoring.', tags:['Weekly','Wellness'], bars:[60,70,75,80,65,70], features:['After-hours work detection','Break frequency analysis','Overtime trending','Burnout risk assessment','Wellness recommendations'] },
  { type:'compliance', name:'Audit Log Report', desc:'Complete access and activity audit trail.', tags:['On-demand','Security'], bars:[100,100,100,100,100,100], features:['All admin actions logged','Data access records','Policy change history','Export and deletion records','Exportable for compliance review'] },
  { type:'compliance', name:'Data Privacy Summary', desc:'What data is collected and how it is used.', tags:['Monthly','Privacy'], bars:[80,75,85,70,90,80], features:['Data collection summary','User consent status','Retention policy compliance','Sub-processor inventory','GDPR/CCPA readiness score'] },
  { type:'compliance', name:'SOC 2 Evidence Pack', desc:'Pre-packaged evidence for SOC 2 auditors.', tags:['Annual','Audit'], bars:[95,90,85,95,90,88], features:['Control evidence mapping','Access control documentation','Encryption verification','Incident response records','Change management logs'] },
];

function renderGallery(filter) {
  const g = document.getElementById('gallery');
  const filtered = filter === 'all' ? reports : reports.filter(r => r.type === filter);
  g.innerHTML = filtered.map((r, i) => {
    const bars = r.bars.map(h => `<div class="mock-bar" style="height:${h}%"></div>`).join('');
    const tags = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const mockType = i % 3;
    let mockContent = '';
    if (mockType === 0) mockContent = `<div class="mock-header"><span class="mock-title">${r.name}</span><span class="mock-badge">${r.type}</span></div><div class="mock-bars">${bars}</div><div class="mock-metrics"><div class="mock-metric"><div class="num">78%</div><div class="lbl">Score</div></div><div class="mock-metric"><div class="num">15.2h</div><div class="lbl">Saved</div></div><div class="mock-metric"><div class="num">+12%</div><div class="lbl">Growth</div></div></div>`;
    else if (mockType === 1) mockContent = `<div class="mock-header"><span class="mock-title">${r.name}</span><span class="mock-badge">${r.type}</span></div><div class="mock-pie"></div><div class="mock-lines"><div class="mock-line"></div><div class="mock-line short"></div></div>`;
    else mockContent = `<div class="mock-header"><span class="mock-title">${r.name}</span><span class="mock-badge">${r.type}</span></div><div class="mock-table"><div class="mock-row"><div class="mock-cell head"></div><div class="mock-cell head"></div><div class="mock-cell head"></div></div><div class="mock-row"><div class="mock-cell"></div><div class="mock-cell"></div><div class="mock-cell"></div></div><div class="mock-row"><div class="mock-cell"></div><div class="mock-cell"></div><div class="mock-cell"></div></div><div class="mock-row"><div class="mock-cell"></div><div class="mock-cell"></div><div class="mock-cell"></div></div></div>`;
    return `<div class="report-card" onclick="openModal(${i})"><div class="report-thumb"><div class="mock">${mockContent}</div></div><div class="report-info"><div class="report-type">${r.type}</div><div class="report-name">${r.name}</div><div class="report-desc">${r.desc}</div><div class="report-tags">${tags}</div></div></div>`;
  }).join('');
}

function openModal(i) {
  const r = reports[i];
  const features = r.features.map(f => `<li>${f}</li>`).join('');
  document.getElementById('modal-content').innerHTML = `<div class="type">${r.type.toUpperCase()} REPORT</div><h2>${r.name}</h2><p>${r.desc}</p><p>This report is generated automatically and can be scheduled for delivery via email (daily, weekly, or monthly). Available in PDF and interactive web formats.</p><h3 style="font-size:16px;font-weight:700;margin:16px 0 8px;">What's Included</h3><ul class="modal-features">${features}</ul><a href="#" class="modal-cta">Try Go2 Free &rarr;</a>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.filter);
  });
});

renderGallery('all');
</script>
</body>
</html>
