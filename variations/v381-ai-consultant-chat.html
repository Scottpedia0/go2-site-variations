<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go2 AI Consultant | Talk to Our AI About Your Business</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6C5CE7;--primary-dark:#5A4BD1;--bg:#0F0F1A;--surface:#1A1A2E;--surface2:#252540;--text:#E8E8F0;--text-dim:#8888AA;--accent:#00D2FF;--success:#00E676;--warning:#FFD600;--gradient:linear-gradient(135deg,#6C5CE7,#00D2FF)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(20px);background:rgba(15,15,26,0.8);position:relative;z-index:10}
.logo{font-size:24px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-weight:300;opacity:0.7}
.status-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--success);background:rgba(0,230,118,0.1);padding:6px 14px;border-radius:20px}
.status-badge::before{content:'';width:8px;height:8px;background:var(--success);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.chat-container{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:0 20px;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:30px 0;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
.message{display:flex;gap:12px;animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1);max-width:85%}
.message.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.message.bot .avatar{background:var(--gradient)}
.message.user .avatar{background:var(--surface2)}
.bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;letter-spacing:0.01em}
.message.bot .bubble{background:var(--surface);border:1px solid rgba(255,255,255,0.05);border-top-left-radius:4px}
.message.user .bubble{background:var(--primary);border-top-right-radius:4px}
.bubble p{margin-bottom:10px}
.bubble p:last-child{margin-bottom:0}
.bubble strong{color:var(--accent);font-weight:600}
.bubble ul{margin:8px 0;padding-left:20px}
.bubble ul li{margin-bottom:6px;color:var(--text-dim)}
.bubble ul li strong{color:var(--text)}
.typing-indicator{display:flex;gap:12px;max-width:85%;animation:msgIn 0.3s ease}
.typing-indicator .avatar{width:36px;height:36px;border-radius:12px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.typing-dots{background:var(--surface);border:1px solid rgba(255,255,255,0.05);padding:14px 20px;border-radius:16px;border-top-left-radius:4px;display:flex;gap:5px;align-items:center}
.typing-dots span{width:7px;height:7px;background:var(--text-dim);border-radius:50%;animation:typingBounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:10px 0;animation:msgIn 0.4s ease}
.quick-reply{background:var(--surface);border:1px solid rgba(108,92,231,0.3);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.quick-reply:hover{background:var(--primary);border-color:var(--primary);transform:translateY(-1px)}
.input-area{padding:20px 0 30px;border-top:1px solid rgba(255,255,255,0.06)}
.input-wrapper{display:flex;gap:12px;background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:6px;transition:border-color 0.2s}
.input-wrapper:focus-within{border-color:var(--primary)}
.input-wrapper input{flex:1;background:none;border:none;color:var(--text);font-size:14px;padding:10px 14px;font-family:'Inter',sans-serif;outline:none}
.input-wrapper input::placeholder{color:var(--text-dim)}
.send-btn{background:var(--gradient);border:none;color:white;width:42px;height:42px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,opacity 0.2s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.recommendation-card{background:linear-gradient(135deg,rgba(108,92,231,0.15),rgba(0,210,255,0.1));border:1px solid rgba(108,92,231,0.2);border-radius:12px;padding:16px;margin:12px 0}
.recommendation-card h4{color:var(--accent);font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.recommendation-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
.metric-row{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.metric{background:rgba(0,0,0,0.3);border-radius:10px;padding:12px;flex:1;min-width:100px;text-align:center}
.metric .value{font-size:22px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.metric .label{font-size:11px;color:var(--text-dim);margin-top:4px}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin:8px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--gradient);border-radius:3px;animation:fillBar 1.5s ease forwards;transform-origin:left}
@keyframes fillBar{from{width:0}to{width:var(--width)}}
.bg-glow{position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(108,92,231,0.08),transparent 50%),radial-gradient(circle at 70% 60%,rgba(0,210,255,0.05),transparent 50%);pointer-events:none;z-index:0}
.chat-container{position:relative;z-index:1}
.header{position:relative;z-index:2}
@media(max-width:768px){.header{padding:16px 20px}.message{max-width:92%}.metric-row{flex-direction:column}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<header class="header">
<div class="logo">Go2<span>.ai Consultant</span></div>
<div class="status-badge">AI Online</div>
</header>
<div class="chat-container">
<div class="messages" id="messages"></div>
<div id="quickReplies"></div>
<div class="input-area">
<div class="input-wrapper">
<input type="text" id="userInput" placeholder="Describe your business or ask a question..." autocomplete="off">
<button class="send-btn" id="sendBtn" onclick="sendMessage()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
</button>
</div>
</div>
</div>
<script>
const msgs=document.getElementById('messages'),input=document.getElementById('userInput'),sendBtn=document.getElementById('sendBtn'),qrContainer=document.getElementById('quickReplies');
let conversationState='intro',businessType='',teamSize='',challenges=[];
const knowledgeBase={
industries:{
saas:{name:'SaaS',challenges:['developer productivity','sprint velocity','feature shipping speed','code review bottlenecks'],metrics:{productivity:'32%',timesSaved:'14hrs/week',roi:'340%'}},
agency:{name:'Agency/Consulting',challenges:['client communication overhead','project scope creep','resource allocation','billable hour tracking'],metrics:{productivity:'28%',timesSaved:'11hrs/week',roi:'290%'}},
ecommerce:{name:'E-Commerce',challenges:['cross-team coordination','inventory decisions','customer response time','marketing-ops alignment'],metrics:{productivity:'35%',timesSaved:'16hrs/week',roi:'380%'}},
healthcare:{name:'Healthcare',challenges:['compliance documentation','staff scheduling','patient follow-ups','interdepartmental communication'],metrics:{productivity:'26%',timesSaved:'12hrs/week',roi:'310%'}},
finance:{name:'Finance',challenges:['regulatory reporting','risk assessment speed','client portfolio reviews','meeting overload'],metrics:{productivity:'30%',timesSaved:'13hrs/week',roi:'350%'}},
general:{name:'Your Industry',challenges:['communication overhead','meeting fatigue','context switching','documentation gaps'],metrics:{productivity:'29%',timesSaved:'12hrs/week',roi:'300%'}}
},
teamSizeInsights:{
small:{label:'Small Team (1-20)',insight:'Small teams lose 23% of productive time to context switching. Go2 creates unified workflows that eliminate redundant standups and status updates.',savings:'$48,000/year'},
medium:{label:'Mid-Size (20-100)',insight:'Mid-size companies face the coordination tax most acutely. Go2\'s AI identifies communication bottlenecks before they become blockers.',savings:'$320,000/year'},
large:{label:'Enterprise (100+)',insight:'At scale, institutional knowledge loss costs $15K per employee departure. Go2\'s auto-documentation and knowledge graph preserves organizational intelligence.',savings:'$2.1M/year'}
}
};
function addMessage(content,type='bot',html=false){
const div=document.createElement('div');div.className=`message ${type}`;
const emoji=type==='bot'?'🤖':'👤';
div.innerHTML=`<div class="avatar">${emoji}</div><div class="bubble">${html?content:formatText(content)}</div>`;
msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function formatText(t){return t.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('')}
function showTyping(){
const div=document.createElement('div');div.className='typing-indicator';div.id='typing';
div.innerHTML=`<div class="avatar">🤖</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove()}
function showQuickReplies(options){
qrContainer.innerHTML='';
const div=document.createElement('div');div.className='quick-replies';
options.forEach(o=>{
const btn=document.createElement('button');btn.className='quick-reply';btn.textContent=o.label;
btn.onclick=()=>{qrContainer.innerHTML='';addMessage(o.label,'user');setTimeout(()=>o.action(),300)};
div.appendChild(btn);
});
qrContainer.appendChild(div);
}
function typeResponse(text,html=false,delay=800){
return new Promise(r=>{
showTyping();
const d=Math.min(delay+text.length*8,3000);
setTimeout(()=>{hideTyping();addMessage(text,'bot',html);r()},d);
});
}
async function startConversation(){
await typeResponse("Welcome to Go2's AI Consultant. I'm here to analyze your business and show you exactly how AI-powered productivity coaching can transform your team.\n\nI've helped analyze 2,400+ companies across every industry. Let me ask you a few questions to build a custom recommendation.");
await typeResponse("First — what industry best describes your business?");
showQuickReplies([
{label:'SaaS / Software',action:()=>handleIndustry('saas')},
{label:'Agency / Consulting',action:()=>handleIndustry('agency')},
{label:'E-Commerce / Retail',action:()=>handleIndustry('ecommerce')},
{label:'Healthcare',action:()=>handleIndustry('healthcare')},
{label:'Finance / Fintech',action:()=>handleIndustry('finance')},
{label:'Other',action:()=>handleIndustry('general')}
]);
conversationState='industry';
}
async function handleIndustry(type){
businessType=type;
const ind=knowledgeBase.industries[type];
conversationState='teamSize';
await typeResponse(`${ind.name} — great. I have deep benchmarks for this space.\n\nDid you know that ${ind.name.toLowerCase()} companies report an average of ${ind.challenges[0]} as their #1 productivity drain? We see this pattern consistently.`);
await typeResponse("How large is your team?");
showQuickReplies([
{label:'1-20 people',action:()=>handleTeamSize('small')},
{label:'20-100 people',action:()=>handleTeamSize('medium')},
{label:'100+ people',action:()=>handleTeamSize('large')}
]);
}
async function handleTeamSize(size){
teamSize=size;
const info=knowledgeBase.teamSizeInsights[size];
conversationState='challenges';
await typeResponse(`${info.label}. ${info.insight}\n\nBased on our data, companies your size typically save ${info.savings} annually with Go2.`);
await typeResponse("What's your biggest pain point right now? Select all that apply (or type your own):");
const ind=knowledgeBase.industries[businessType];
showQuickReplies([
{label:'Too many meetings',action:()=>handleChallenge('Too many meetings')},
{label:'Context switching',action:()=>handleChallenge('Context switching')},
{label:ind.challenges[0],action:()=>handleChallenge(ind.challenges[0])},
{label:ind.challenges[1],action:()=>handleChallenge(ind.challenges[1])},
{label:'Knowledge silos',action:()=>handleChallenge('Knowledge silos')},
{label:'Slow decisions',action:()=>handleChallenge('Slow decisions')}
]);
}
async function handleChallenge(challenge){
challenges.push(challenge);
if(challenges.length<2){
conversationState='challenges2';
await typeResponse(`"${challenge}" — that's in the top 3 issues we see. Anything else?`);
showQuickReplies([
{label:'Communication overhead',action:()=>handleChallenge('Communication overhead')},
{label:'Documentation gaps',action:()=>handleChallenge('Documentation gaps')},
{label:'Team visibility',action:()=>handleChallenge('Team visibility')},
{label:'That\'s it, show me results',action:()=>generateReport()}
]);
}else{
await generateReport();
}
}
async function generateReport(){
conversationState='report';
const ind=knowledgeBase.industries[businessType];
const ts=knowledgeBase.teamSizeInsights[teamSize];
await typeResponse("Analyzing your profile against our database of 2,400+ companies...");
const reportHtml=`
<p><strong>Custom Go2 Analysis Report</strong></p>
<div class="recommendation-card">
<h4>Your Productivity Score Estimate</h4>
<p>Based on ${ind.name} benchmarks for ${ts.label.toLowerCase()} teams with challenges in ${challenges.join(' and ')}.</p>
<div class="metric-row">
<div class="metric"><div class="value">${ind.metrics.productivity}</div><div class="label">Productivity Gain</div></div>
<div class="metric"><div class="value">${ind.metrics.timesSaved}</div><div class="label">Time Saved</div></div>
<div class="metric"><div class="value">${ind.metrics.roi}</div><div class="label">First-Year ROI</div></div>
</div>
</div>
<div class="recommendation-card">
<h4>Recommended Go2 Modules</h4>
<p><strong>1. AI Meeting Intelligence</strong> — Auto-captures decisions, action items, and follow-ups. Reduces meeting time by 40%.</p>
<div class="progress-bar"><div class="fill" style="--width:92%"></div></div>
<p style="font-size:11px;color:#8888AA">92% match for your challenges</p>
<p style="margin-top:12px"><strong>2. Workflow Autopilot</strong> — Identifies repetitive patterns and automates them. Your team focuses on creative work.</p>
<div class="progress-bar"><div class="fill" style="--width:87%"></div></div>
<p style="font-size:11px;color:#8888AA">87% match for your challenges</p>
<p style="margin-top:12px"><strong>3. Knowledge Graph</strong> — Maps your organization's expertise and institutional knowledge. Eliminates silos.</p>
<div class="progress-bar"><div class="fill" style="--width:78%"></div></div>
<p style="font-size:11px;color:#8888AA">78% match for your challenges</p>
</div>
<div class="recommendation-card">
<h4>Projected Annual Impact</h4>
<p>For a ${ts.label.toLowerCase()} ${ind.name.toLowerCase()} company: <strong>${ts.savings} in recovered productivity</strong></p>
<p style="margin-top:8px;font-size:13px">This factors in ${ind.metrics.timesSaved} saved per person, reduced meeting overhead, and faster decision-making cycles.</p>
</div>`;
await typeResponse(reportHtml,true,2000);
await typeResponse("This is your personalized roadmap. The companies that see the fastest ROI typically start with Meeting Intelligence — it delivers visible results in week one.\n\nWant me to dive deeper into any of these recommendations?");
showQuickReplies([
{label:'Tell me about Meeting Intelligence',action:()=>deepDive('meetings')},
{label:'How does Workflow Autopilot work?',action:()=>deepDive('workflow')},
{label:'What about data privacy?',action:()=>deepDive('privacy')},
{label:'Show me pricing',action:()=>deepDive('pricing')},
{label:'I want a live demo',action:()=>deepDive('demo')}
]);
}
async function deepDive(topic){
const responses={
meetings:`Go2's Meeting Intelligence is the most-loved feature by our ${knowledgeBase.industries[businessType].name} clients.\n\nHere's what it does:\n• Joins your meetings silently (Zoom, Teams, Meet)\n• Transcribes in real-time with speaker attribution\n• Extracts action items, decisions, and deadlines automatically\n• Sends a structured summary to your project management tool within 60 seconds of meeting end\n• Flags when decisions contradict previous commitments\n\nOur data shows teams reduce recurring meetings by 40% within the first month because async summaries replace "status update" calls.\n\nThe average manager spends 23 hours/week in meetings. We bring that below 14.`,
workflow:`Workflow Autopilot uses pattern recognition across your team's actual work — not templates.\n\nIt watches how your team moves tasks, writes updates, and communicates decisions. After 2 weeks of learning, it starts suggesting automations:\n\n• "I noticed you copy standup notes to Slack every morning — want me to do that?"\n• "This approval chain has 3 steps but only 1 person ever rejects — simplify?"\n• "Your deploy process has 6 manual steps. Here's a one-click version."\n\nIt's not rigid automation. It's AI that adapts to how YOUR team actually works. Acceptance rate on suggestions is 84% across our customer base.`,
privacy:`Data privacy is foundational to Go2 — not an afterthought.\n\n• SOC 2 Type II certified\n• GDPR and CCPA compliant\n• All data encrypted at rest (AES-256) and in transit (TLS 1.3)\n• Your data is NEVER used to train models\n• On-premise deployment available for enterprise\n• You own your data — full export anytime, full deletion on request\n• We publish annual transparency reports\n\nFor ${knowledgeBase.industries[businessType].name} specifically, we have additional compliance modules available.`,
pricing:`Go2 pricing scales with your team:\n\n• Starter: $12/user/month — Core AI coaching + meeting intelligence\n• Professional: $24/user/month — Full suite including Workflow Autopilot\n• Enterprise: Custom — On-premise, SSO, dedicated success manager\n\nFor a ${knowledgeBase.teamSizeInsights[teamSize].label.toLowerCase()} team, most clients start with Professional. The ROI typically covers the cost within the first 3 weeks.\n\nWe offer a 30-day free trial with full features. No credit card required.`,
demo:`I'd love to set that up! A live demo typically covers:\n\n• Your specific use cases and workflows\n• Live AI analysis of a real meeting or document\n• Custom ROI projection for your exact team\n• Q&A with a solutions engineer\n\nYou can book a 30-minute session at go2.io/demo — or I can have our team reach out directly.\n\nIn the meantime, everything I've shown you today is available in our free trial. You can start seeing results before the demo call.`
};
await typeResponse(responses[topic]);
if(topic!=='demo'){
showQuickReplies([
{label:'Book a demo',action:()=>deepDive('demo')},
{label:'Start free trial',action:()=>handleCTA()},
{label:'Ask another question',action:()=>resetInput()}
]);
}else{
await typeResponse("Ready to see Go2 in action? Start your free trial today — no credit card, no commitment, just results.",false,1000);
showQuickReplies([
{label:'Start Free Trial →',action:()=>handleCTA()},
{label:'I have more questions',action:()=>resetInput()}
]);
}
}
async function handleCTA(){
const ctaHtml=`
<div class="recommendation-card">
<h4>🚀 Start Your Free Trial</h4>
<p>You're one step away from transforming your team's productivity.</p>
<p style="margin-top:12px"><strong>What you'll get:</strong></p>
<ul>
<li>30 days of full Go2 Professional access</li>
<li>AI Meeting Intelligence from day one</li>
<li>Workflow Autopilot after 2-week learning period</li>
<li>Dedicated onboarding specialist</li>
<li>Custom benchmarking against ${knowledgeBase.industries[businessType].name} peers</li>
</ul>
<p style="margin-top:12px;color:var(--accent)"><strong>go2.io/start</strong> — No credit card required</p>
</div>`;
await typeResponse(ctaHtml,true);
}
function resetInput(){
qrContainer.innerHTML='';
input.focus();
conversationState='freeform';
}
function sendMessage(){
const text=input.value.trim();if(!text)return;
input.value='';addMessage(text,'user');
if(conversationState==='freeform'||conversationState==='report'){handleFreeform(text)}
else if(conversationState==='industry'){handleIndustry('general')}
else if(conversationState==='challenges'||conversationState==='challenges2'){handleChallenge(text)}
}
async function handleFreeform(text){
const lower=text.toLowerCase();
if(lower.includes('price')||lower.includes('cost')||lower.includes('pricing')){await deepDive('pricing')}
else if(lower.includes('demo')||lower.includes('trial')||lower.includes('try')){await deepDive('demo')}
else if(lower.includes('privacy')||lower.includes('security')||lower.includes('data')){await deepDive('privacy')}
else if(lower.includes('meeting')){await deepDive('meetings')}
else if(lower.includes('automat')||lower.includes('workflow')){await deepDive('workflow')}
else if(lower.includes('integrat')){
await typeResponse("Go2 integrates with your entire stack:\n\n• Communication: Slack, Teams, Email\n• Meetings: Zoom, Google Meet, Teams\n• Project Management: Jira, Asana, Linear, Monday\n• Documents: Google Workspace, Notion, Confluence\n• Code: GitHub, GitLab, Bitbucket\n• CRM: Salesforce, HubSpot\n\nSetup takes under 5 minutes per integration. Our AI starts learning your workflows immediately.");
}else{
await typeResponse(`That's a great question. Based on your ${knowledgeBase.industries[businessType].name} profile, here's what I can tell you:\n\nGo2's AI adapts to your specific context. Rather than generic advice, it learns YOUR team's patterns, YOUR communication style, and YOUR workflow bottlenecks.\n\nThe key insight from analyzing 2,400+ companies: productivity isn't about working harder. It's about eliminating the invisible friction that steals 30% of every knowledge worker's day.\n\nWant me to get more specific? Ask about any feature, or I can connect you with our team.`);
showQuickReplies([
{label:'Tell me about integrations',action:()=>{addMessage('Tell me about integrations','user');handleFreeform('integrations')}},
{label:'Book a demo',action:()=>deepDive('demo')},
{label:'Start free trial',action:()=>handleCTA()}
]);
}
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
startConversation();
</script>
</body>
</html>
