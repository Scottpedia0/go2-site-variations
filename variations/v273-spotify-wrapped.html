<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Company, Wrapped | Go2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;width:100vw;user-select:none}
#app{width:100%;height:100%;position:relative}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;opacity:0;transform:scale(.95);transition:all .6s cubic-bezier(.4,0,.2,1);pointer-events:none;overflow:hidden}
.slide.active{opacity:1;transform:scale(1);pointer-events:auto}
.slide.exit-left{opacity:0;transform:translateX(-100%) scale(.9)}
.slide.exit-right{opacity:0;transform:translateX(100%) scale(.9)}
/* Backgrounds */
.bg-1{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.bg-2{background:linear-gradient(135deg,#e94560,#c23616)}
.bg-3{background:linear-gradient(135deg,#0f3460,#533483)}
.bg-4{background:linear-gradient(135deg,#2d6a4f,#40916c)}
.bg-5{background:linear-gradient(135deg,#ff6b35,#f7c59f,#efefd0)}
.bg-5 *{color:#1a1a2e!important}
.bg-6{background:linear-gradient(135deg,#7b2ff7,#c471f5)}
.bg-7{background:linear-gradient(135deg,#1a1a2e,#e94560)}
.bg-8{background:linear-gradient(135deg,#f72585,#b5179e,#7209b7)}
/* Typography */
.mega{font-size:clamp(3rem,12vw,8rem);font-weight:900;line-height:.95;letter-spacing:-2px}
.big{font-size:clamp(2rem,6vw,4rem);font-weight:900;line-height:1.1}
.medium{font-size:clamp(1.2rem,3vw,2rem);font-weight:700;line-height:1.3}
.small{font-size:clamp(.9rem,2vw,1.2rem);font-weight:400;line-height:1.5;opacity:.8}
.label{font-size:.7rem;text-transform:uppercase;letter-spacing:3px;opacity:.6;font-weight:600}
/* Animations */
@keyframes countUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.animate-in{animation:slideUp .8s ease forwards}
.delay-1{animation-delay:.2s;opacity:0}
.delay-2{animation-delay:.4s;opacity:0}
.delay-3{animation-delay:.6s;opacity:0}
.delay-4{animation-delay:.8s;opacity:0}
.delay-5{animation-delay:1s;opacity:0}
/* Counter */
.counter{font-variant-numeric:tabular-nums}
/* Stat Card */
.stat-row{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin:2rem 0}
.stat-card{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border-radius:16px;padding:1.5rem 2rem;text-align:center;min-width:140px}
.stat-card .val{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900}
.stat-card .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-top:.3rem}
/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:500px}
.bar-row{display:flex;align-items:center;gap:1rem}
.bar-label{width:120px;text-align:right;font-size:.8rem;font-weight:600;flex-shrink:0}
.bar{height:28px;border-radius:14px;background:rgba(255,255,255,.2);position:relative;flex:1;overflow:hidden}
.bar-fill{height:100%;border-radius:14px;transition:width 1.5s cubic-bezier(.4,0,.2,1)}
.bar-value{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.7rem;font-weight:700}
/* Progress ring */
.ring-container{position:relative;width:200px;height:200px;margin:1rem auto}
.ring-container svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:12}
.ring-fill{fill:none;stroke:#fff;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 2s cubic-bezier(.4,0,.2,1)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Navigation */
.nav{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;z-index:100}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;border:none;padding:0}
.nav-dot.active{background:#fff;width:24px;border-radius:4px}
.nav-arrows{position:fixed;top:50%;z-index:100;display:flex;justify-content:space-between;width:100%;padding:0 1rem;transform:translateY(-50%);pointer-events:none}
.nav-arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.2rem;cursor:pointer;pointer-events:auto;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);transition:all .2s}
.nav-arrow:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}
/* Top items list */
.top-list{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:450px}
.top-item{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;background:rgba(255,255,255,.08);border-radius:12px}
.top-num{font-size:1.5rem;font-weight:900;opacity:.5;width:30px}
.top-info{flex:1}
.top-info .title{font-weight:700;font-size:.95rem}
.top-info .sub{font-size:.75rem;opacity:.6}
.top-time{font-weight:900;font-size:1.1rem}
/* Share card */
.share-card{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border-radius:20px;padding:2.5rem;text-align:center;max-width:400px;width:90%}
.share-btns{display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.share-btn{padding:.75rem 1.5rem;border-radius:50px;border:none;font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s}
.share-btn:hover{transform:translateY(-2px)}
.share-btn.tw{background:#1DA1F2;color:#fff}
.share-btn.li{background:#0077B5;color:#fff}
.share-btn.go2{background:linear-gradient(135deg,#e94560,#f72585);color:#fff}
/* Swipe hint */
.swipe-hint{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:.75rem;letter-spacing:2px;text-transform:uppercase;z-index:100;animation:fadeIn 1s ease 2s forwards;opacity:0}
</style>
</head>
<body>
<div id="app"></div>
<div class="nav" id="nav"></div>
<div class="nav-arrows">
<button class="nav-arrow" onclick="prev()">&#x2190;</button>
<button class="nav-arrow" onclick="next()">&#x2192;</button>
</div>
<div class="swipe-hint">Tap or swipe to continue</div>

<div class="top-item"><div class="top-num">4</div><div class="top-info"><div class="title">Manual data entry</div><div class="sub">Copy, paste, copy, paste, copy, paste</div></div><div class="top-time">389h</div></div>
<div class="top-item"><div class="top-num">5</div><div class="top-info"><div class="title">Status update reporting</div><div class="sub">Writing about work instead of doing work</div></div><div class="top-time">301h</div></div>
</div>
`},
// 3: Automation
{bg:'bg-4',html:`
<div class="label animate-in">YOUR #1 AUTOMATION OPPORTUNITY</div>
<div class="big animate-in delay-1" style="margin:1rem 0">Invoice<br>Processing.</div>
<div class="animate-in delay-2">
<div class="ring-container">
<svg viewBox="0 0 200 200" width="200" height="200">
<circle class="ring-bg" cx="100" cy="100" r="85"/>
<circle class="ring-fill" cx="100" cy="100" r="85" stroke-dasharray="534" stroke-dashoffset="534" id="ring1"/>
</svg>
<div class="ring-text"><div class="mega counter" data-count="73" data-suffix="%">0</div><div class="label">automatable</div></div>

{bg:'bg-5',html:`
<div class="label animate-in">IF YOU HAD GO2 ALL YEAR</div>
<div class="animate-in delay-1" style="margin:1rem 0"><div class="mega counter" data-count="4380" data-suffix=" hours">0</div></div>
<div class="medium animate-in delay-2">saved.</div>
<div class="small animate-in delay-3" style="margin-top:1rem;max-width:400px;text-align:center">That's 2.5 full-time employees worth of reclaimed productivity. Or $328,500 at average loaded cost.</div>
<div class="bar-chart animate-in delay-4">
<div class="bar-row"><div class="bar-label">AI Coaching</div><div class="bar"><div class="bar-fill" data-width="75" style="width:0;background:linear-gradient(90deg,#e94560,#f72585)"></div><div class="bar-value">1,640h</div></div></div>
<div class="bar-row"><div class="bar-label">Automation</div><div class="bar"><div class="bar-fill" data-width="62" style="width:0;background:linear-gradient(90deg,#7209b7,#b5179e)"></div><div class="bar-value">1,350h</div></div></div>
<div class="bar-row"><div class="bar-label">Auto-Docs</div><div class="bar"><div class="bar-fill" data-width="45" style="width:0;background:linear-gradient(90deg,#3a86ff,#8338ec)"></div><div class="bar-value">890h</div></div></div>
<div class="bar-row"><div class="bar-label">Agent Deploy</div><div class="bar"><div class="bar-fill" data-width="23" style="width:0;background:linear-gradient(90deg,#06d6a0,#1b9aaa)"></div><div class="bar-value">500h</div></div></div>
</div>
`},
// 5: The comparison
{bg:'bg-6',html:`
<div class="label animate-in">YOUR COMPANY VS. GO2 CLIENTS</div>
<div class="medium animate-in delay-1" style="margin:1rem 0">The productivity gap<br>is real.</div>
<div class="stat-row animate-in delay-2">

<div class="stat-card" style="border:2px solid rgba(255,255,255,.4)"><div class="val" style="color:#22c55e">89%</div><div class="lbl">satisfaction rate<br>(with Go2)</div></div>
</div>

</div>
<div class="small animate-in delay-4" style="max-width:400px;text-align:center;margin-top:1rem">Go2 clients don't just deploy AI. They deploy AI that actually works — because it's built on real work data.</div>
`},
// 6: Your persona

<div class="top-item" style="background:rgba(59,130,246,.2)"><div style="font-size:1.5rem">&#x1F4A1;</div><div class="top-info"><div class="title">Creative Flow</div><div class="sub">10% of your day</div></div></div>
</div>

// 7: CTA / Share
{bg:'bg-8',html:`
<div class="share-card animate-in">
<div class="label" style="margin-bottom:1rem">YOUR 2025 WRAPPED</div>

<div class="small" style="margin:1rem 0">Go2 captures how work happens, coaches via AI, auto-documents everything, and deploys agents that actually work.</div>
<div style="margin:1.5rem 0"><div class="stat-row" style="margin:0"><div class="stat-card"><div class="val">4,380h</div><div class="lbl">to save</div></div><div class="stat-card"><div class="val">$328K</div><div class="lbl">in value</div></div></div></div>
<div class="share-btns">
<button class="share-btn tw" onclick="shareTwitter()">Share on Twitter</button>
<button class="share-btn li" onclick="shareLinkedIn()">Share on LinkedIn</button>
</div>
<a href="https://go2.io" target="_blank" class="share-btn go2" style="display:inline-block;margin-top:1rem;text-decoration:none">Get Your Real Wrapped &#x2192;</a>
</div>

];
let current=0;
const app=document.getElementById('app');
const nav=document.getElementById('nav');
// Build slides
slides.forEach((s,i)=>{
const div=document.createElement('div');
div.className=`slide ${s.bg}${i===0?' active':''}`;
div.innerHTML=s.html;
div.id=`slide-${i}`;
app.appendChild(div);
const dot=document.createElement('button');
dot.className=`nav-dot${i===0?' active':''}`;
dot.onclick=()=>goTo(i);
nav.appendChild(dot);
});
function goTo(idx){
if(idx<0||idx>=slides.length||idx===current)return;
const dir=idx>current?'left':'right';
const cur=document.getElementById(`slide-${current}`);
const nxt=document.getElementById(`slide-${idx}`);
cur.classList.remove('active');
cur.classList.add(`exit-${dir}`);
setTimeout(()=>cur.classList.remove(`exit-${dir}`),600);
nxt.classList.add('active');
document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
current=idx;
animateSlide(nxt);
}
function next(){goTo(current+1)}
function prev(){goTo(current-1)}
function animateSlide(slide){
// Counter animation
slide.querySelectorAll('.counter').forEach(el=>{
const target=parseInt(el.dataset.count);
const suffix=el.dataset.suffix||'';
let start=0;
const duration=2000;
const startTime=performance.now();
function update(now){
const elapsed=now-startTime;
const progress=Math.min(elapsed/duration,1);
const eased=1-Math.pow(1-progress,3);
el.textContent=Math.floor(target*eased).toLocaleString()+suffix;
if(progress<1)requestAnimationFrame(update);
}
setTimeout(()=>requestAnimationFrame(update),400);
});
// Bar fills
slide.querySelectorAll('.bar-fill').forEach(bar=>{
const w=bar.dataset.width;
setTimeout(()=>{bar.style.width=w+'%';},800);
});
// Ring
const ring=slide.querySelector('#ring1');
if(ring){setTimeout(()=>{ring.style.strokeDashoffset=534*(1-.73);},800);}
// Re-trigger animations
slide.querySelectorAll('.animate-in').forEach(el=>{
el.style.animation='none';
el.offsetHeight;
el.style.animation='';
});
}
// Touch/swipe
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
const diff=e.changedTouches[0].clientX-touchStartX;
if(Math.abs(diff)>50){diff<0?next():prev();}
});
// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='ArrowRight'||e.key===' ')next();
if(e.key==='ArrowLeft')prev();
});
// Click to advance
app.addEventListener('click',e=>{
if(e.target.tagName==='BUTTON'||e.target.tagName==='A')return;
const x=e.clientX;
if(x>window.innerWidth*.6)next();
else if(x<window.innerWidth*.4)prev();
});
// Initial animation
animateSlide(document.getElementById('slide-0'));
function shareTwitter(){window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('My company context-switched 12,847 times this year. Go2 found we could save 4,380 hours with AI coaching and automation. Get your Company Wrapped:')}&url=${encodeURIComponent('https://go2.io')}`,'_blank');}
function shareLinkedIn(){window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent('https://go2.io')}`,'_blank');}
</script>
</body>
</html>
